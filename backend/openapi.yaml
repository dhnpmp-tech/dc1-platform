openapi: 3.0.3
info:
  title: DCP — Decentralized Compute Platform API
  description: |
    REST API for the DC1 GPU compute marketplace. Exposes endpoints for GPU
    providers (registration, heartbeat, job management), renters (top-up, job
    submission, API keys), and platform administrators (overview, revenue,
    provider management, payouts, data export).

    **Auth schemes**
    - `bearerRenter` — `Authorization: Bearer <renter-api-key>` issued via
      `/api/renters/me/keys`.
    - `providerToken` — `Authorization: Bearer <provider-api-key>` assigned
      at registration via `/api/providers/register`.
    - `adminToken` — `Authorization: Bearer <DC1_ADMIN_TOKEN>` (static env
      token) or a signed JWT with `role: admin`.
  version: "1.0.0"
  contact:
    name: DCP Engineering
    email: setup@oida.ae

servers:
  - url: https://api.dcp.sa/api
    description: Production (HTTPS, nginx → port 8083)
  - url: http://localhost:8083/api
    description: Local development

tags:
  - name: providers
    description: GPU provider registration, heartbeat, and job management
  - name: renters
    description: Renter account, balance top-up, job submission, and API keys
  - name: admin
    description: Platform administration — monitoring, revenue, and data export
  - name: models
    description: Available LLM and diffusion model catalog
  - name: vllm
    description: vLLM inference completion endpoints (renter-authenticated)
  - name: templates
    description: Docker job templates

components:
  securitySchemes:
    bearerRenter:
      type: http
      scheme: bearer
      description: Renter API key issued by `/api/renters/me/keys`
    providerToken:
      type: http
      scheme: bearer
      description: Provider API key assigned at registration
    adminToken:
      type: http
      scheme: bearer
      description: Admin bearer token (`DC1_ADMIN_TOKEN` env var or JWT with role=admin)

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Provider:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        gpu_model:
          type: string
          example: RTX 4090
        vram_gb:
          type: integer
          example: 24
        status:
          type: string
          enum: [pending, active, suspended, offline]
        online:
          type: boolean
        wallet_address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Renter:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        organization:
          type: string
          nullable: true
        balance_halala:
          type: integer
          description: Balance in halala (1 SAR = 100 halala)
        status:
          type: string
          enum: [active, suspended]
        created_at:
          type: string
          format: date-time

    Job:
      type: object
      properties:
        job_id:
          type: string
          example: job_abc123
        renter_id:
          type: integer
          nullable: true
        provider_id:
          type: integer
          nullable: true
        template_id:
          type: string
          nullable: true
        job_type:
          type: string
          example: llm-inference
        model:
          type: string
          example: llama3-8b
        status:
          type: string
          enum: [pending, queued, assigned, running, completed, failed, cancelled]
        cost_halala:
          type: integer
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        id:
          type: string
        key_prefix:
          type: string
          example: dcp_live_xxxx
        label:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true

    Payout:
      type: object
      properties:
        id:
          type: integer
        provider_id:
          type: integer
        amount_halala:
          type: integer
        status:
          type: string
          enum: [pending, approved, completed, rejected]
        wallet_address:
          type: string
        requested_at:
          type: string
          format: date-time

    JobExportRow:
      type: object
      description: One row in the admin jobs CSV/JSON export
      properties:
        job_id:
          type: string
        renter_id:
          type: integer
          nullable: true
        provider_id:
          type: integer
          nullable: true
        template_id:
          type: string
          nullable: true
        status:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        input_tokens:
          type: integer
          description: |
            Aggregate token count from serve_sessions. Input/output split is not
            tracked separately; this field carries the total. Defaults to 0.
        output_tokens:
          type: integer
          description: Reserved — always 0 in the current release.
        cost_halala:
          type: integer

paths:
  /providers/register:
    post:
      tags: [providers]
      summary: Register a new GPU provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, gpu_model, vram_gb]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                gpu_model:
                  type: string
                  example: RTX 4090
                vram_gb:
                  type: integer
                  example: 24
                wallet_address:
                  type: string
      responses:
        "201":
          description: Provider registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    type: string
                  provider:
                    $ref: "#/components/schemas/Provider"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /providers/heartbeat:
    post:
      tags: [providers]
      summary: Send provider heartbeat (liveness + GPU metrics)
      security:
        - providerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gpu_util_pct:
                  type: number
                vram_used_mb:
                  type: integer
                cpu_util_pct:
                  type: number
                ram_used_mb:
                  type: integer
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /providers/me:
    get:
      tags: [providers]
      summary: Get authenticated provider profile
      security:
        - providerToken: []
      responses:
        "200":
          description: Provider profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Provider"

  /providers/me/gpu-profile:
    patch:
      tags: [providers]
      summary: Update GPU profile
      security:
        - providerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gpu_model:
                  type: string
                vram_gb:
                  type: integer
                gpu_count:
                  type: integer
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /providers/me/wallet:
    patch:
      tags: [providers]
      summary: Set or update payout wallet address
      security:
        - providerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_address]
              properties:
                wallet_address:
                  type: string
      responses:
        "200":
          description: Wallet updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /providers/{id}/activate:
    post:
      tags: [providers]
      summary: Activate a provider (admin)
      security:
        - adminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "404":
          description: Provider not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /providers/jobs/next:
    get:
      tags: [providers]
      summary: Dequeue the next pending job for this provider
      security:
        - providerToken: []
      responses:
        "200":
          description: Next job or empty object when queue is empty
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Job"
                  - type: object
                    properties: {}

  /providers/job-result:
    post:
      tags: [providers]
      summary: Submit job result and trigger settlement
      security:
        - providerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id, status]
              properties:
                job_id:
                  type: string
                status:
                  type: string
                  enum: [completed, failed]
                duration_seconds:
                  type: integer
      responses:
        "200":
          description: Result accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /providers/active:
    get:
      tags: [providers]
      summary: List all currently online providers
      responses:
        "200":
          description: Active provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Provider"

  /providers/marketplace:
    get:
      tags: [providers]
      summary: Marketplace listing with pricing
      responses:
        "200":
          description: Marketplace providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Provider"
                        - type: object
                          properties:
                            price_per_hour_usd:
                              type: number
                              example: 0.267

  /providers/earnings:
    get:
      tags: [providers]
      summary: Provider earnings summary
      security:
        - providerToken: []
      responses:
        "200":
          description: Earnings breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_earned_halala:
                    type: integer
                  total_paid_out_halala:
                    type: integer
                  pending_halala:
                    type: integer

  /renters/register:
    post:
      tags: [renters]
      summary: Register a renter account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                organization:
                  type: string
      responses:
        "201":
          description: Renter created
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    type: string
                  renter:
                    $ref: "#/components/schemas/Renter"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /renters/me:
    get:
      tags: [renters]
      summary: Get authenticated renter profile
      security:
        - bearerRenter: []
      responses:
        "200":
          description: Renter profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Renter"

  /renters/topup:
    post:
      tags: [renters]
      summary: Add credit to renter balance
      security:
        - bearerRenter: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_sar]
              properties:
                amount_sar:
                  type: number
                  example: 100.00
      responses:
        "200":
          description: Balance updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance_halala:
                    type: integer
                  credited_halala:
                    type: integer

  /renters/balance:
    get:
      tags: [renters]
      summary: Get current renter credit balance
      security:
        - bearerRenter: []
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance_halala:
                    type: integer
                  balance_sar:
                    type: number

  /renters/jobs:
    get:
      tags: [renters]
      summary: List renter's jobs
      security:
        - bearerRenter: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"

  /renters/me/jobs/export:
    get:
      tags: [renters]
      summary: Export renter's own jobs as CSV
      security:
        - bearerRenter: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /renters/me/keys:
    get:
      tags: [renters]
      summary: List renter API keys
      security:
        - bearerRenter: []
      responses:
        "200":
          description: Key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
    post:
      tags: [renters]
      summary: Create a new renter API key
      security:
        - bearerRenter: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
      responses:
        "201":
          description: Key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  id:
                    type: string
                  label:
                    type: string
                    nullable: true

  /renters/me/keys/{keyId}:
    delete:
      tags: [renters]
      summary: Revoke a renter API key
      security:
        - bearerRenter: []
      parameters:
        - in: path
          name: keyId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /renters/pricing:
    get:
      tags: [renters]
      summary: Get current GPU pricing for all tiers
      responses:
        "200":
          description: Pricing table
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    price_per_hour_usd:
                      type: number
                    gpu_model:
                      type: string

  /renters/available-providers:
    get:
      tags: [renters]
      summary: List providers available to accept jobs
      security:
        - bearerRenter: []
      responses:
        "200":
          description: Available providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Provider"

  /vllm/complete:
    post:
      tags: [vllm]
      summary: Synchronous LLM completion (OpenAI-compatible)
      security:
        - bearerRenter: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:
                  type: string
                  example: llama3-8b
                prompt:
                  type: string
                max_tokens:
                  type: integer
                  default: 512
                temperature:
                  type: number
                  default: 0.7
      responses:
        "200":
          description: Completion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  choices:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        finish_reason:
                          type: string
                  usage:
                    type: object
                    properties:
                      total_tokens:
                        type: integer
        "402":
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: No serving provider available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /vllm/complete/stream:
    post:
      tags: [vllm]
      summary: Streaming LLM completion (SSE)
      security:
        - bearerRenter: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, prompt]
              properties:
                model:
                  type: string
                prompt:
                  type: string
                max_tokens:
                  type: integer
      responses:
        "200":
          description: SSE stream of completion chunks
          content:
            text/event-stream:
              schema:
                type: string

  /vllm/models:
    get:
      tags: [vllm]
      summary: List models available for vLLM inference
      responses:
        "200":
          description: Model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      type: string

  /models:
    get:
      tags: [models]
      summary: Full model catalog with capabilities and pricing
      parameters:
        - in: query
          name: arabic
          schema:
            type: boolean
          description: Filter to Arabic-capable models only
        - in: query
          name: max_vram_gb
          schema:
            type: integer
      responses:
        "200":
          description: Model catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        arabic_capable:
                          type: boolean
                        vram_gb:
                          type: integer
                        price_per_hour_usd:
                          type: number
                        status:
                          type: string
                          enum: [available, pre-warming, offline]

  /templates:
    get:
      tags: [templates]
      summary: List available Docker job templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        gpu_required:
                          type: boolean
                        vram_gb_min:
                          type: integer

  /admin/overview:
    get:
      tags: [admin]
      summary: Platform overview — provider counts, job stats, revenue
      security:
        - adminToken: []
      responses:
        "200":
          description: Platform overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers_total:
                    type: integer
                  providers_active:
                    type: integer
                  jobs_total:
                    type: integer
                  revenue_total_halala:
                    type: integer

  /admin/revenue:
    get:
      tags: [admin]
      summary: Revenue breakdown by period
      security:
        - adminToken: []
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [day, week, month]
            default: month
      responses:
        "200":
          description: Revenue metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  gross_halala:
                    type: integer
                  platform_fee_halala:
                    type: integer
                  provider_payout_halala:
                    type: integer

  /admin/providers:
    get:
      tags: [admin]
      summary: List all providers with filters
      security:
        - adminToken: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/Provider"
                  total:
                    type: integer

  /admin/providers/{id}/approve:
    patch:
      tags: [admin]
      summary: Approve a pending provider
      security:
        - adminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/providers/{id}/suspend:
    post:
      tags: [admin]
      summary: Suspend a provider
      security:
        - adminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Provider suspended
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/renters:
    get:
      tags: [admin]
      summary: List all renters
      security:
        - adminToken: []
      responses:
        "200":
          description: Renter list
          content:
            application/json:
              schema:
                type: object
                properties:
                  renters:
                    type: array
                    items:
                      $ref: "#/components/schemas/Renter"
                  total:
                    type: integer

  /admin/jobs:
    get:
      tags: [admin]
      summary: List all platform jobs with filters
      security:
        - adminToken: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: provider_id
          schema:
            type: integer
        - in: query
          name: renter_id
          schema:
            type: integer
        - in: query
          name: date_from
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 500
      responses:
        "200":
          description: Job list with aggregate stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: object
                    properties:
                      total:
                        type: integer
                      completed:
                        type: integer
                      failed:
                        type: integer
                      active:
                        type: integer
                      total_revenue_halala:
                        type: integer
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"

  /admin/export/jobs:
    get:
      tags: [admin]
      summary: Export jobs as CSV or JSON for financial reporting
      description: |
        Returns all jobs in the specified date range. Used by the Budget
        Analyst for financial reconciliation (DCP-685 series).

        **Token columns:** `input_tokens` contains the aggregate token count
        from `serve_sessions` where available. `output_tokens` is reserved
        and always 0 in the current release.

        **CSV format:** The `Content-Disposition` header is set to trigger a
        browser download with filename `dcp-jobs-export.csv`.
      security:
        - adminToken: []
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Include jobs created on or after this date (ISO 8601)
          example: "2026-01-01"
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Include jobs created on or before this date (ISO 8601)
          example: "2026-03-31"
        - in: query
          name: format
          schema:
            type: string
            enum: [csv, json]
            default: csv
      responses:
        "200":
          description: Job export
          content:
            text/csv:
              schema:
                type: string
                description: |
                  CSV with columns:
                  job_id, renter_id, provider_id, template_id, status,
                  started_at, completed_at, input_tokens, output_tokens, cost_halala
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobExportRow"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/withdrawals:
    get:
      tags: [admin]
      summary: List provider withdrawal requests
      security:
        - adminToken: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, completed, rejected]
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: object
                properties:
                  withdrawals:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payout"

  /admin/withdrawals/{id}/approve:
    post:
      tags: [admin]
      summary: Approve a provider payout withdrawal
      security:
        - adminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Withdrawal approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/withdrawals/{id}/reject:
    post:
      tags: [admin]
      summary: Reject a provider payout withdrawal
      security:
        - adminToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Withdrawal rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /admin/finance/summary:
    get:
      tags: [admin]
      summary: Financial summary — total revenue, fees, payouts
      security:
        - adminToken: []
      responses:
        "200":
          description: Finance summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  gross_revenue_halala:
                    type: integer
                  platform_fees_halala:
                    type: integer
                  provider_payouts_halala:
                    type: integer
                  pending_payouts_halala:
                    type: integer

  /admin/fleet/health:
    get:
      tags: [admin]
      summary: Fleet health — per-provider liveness and GPU metrics
      security:
        - adminToken: []
      responses:
        "200":
          description: Fleet health
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthy:
                    type: integer
                  degraded:
                    type: integer
                  offline:
                    type: integer
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        gpu_util_pct:
                          type: number
                        last_seen_at:
                          type: string
                          format: date-time

  /admin/health:
    get:
      tags: [admin]
      summary: Backend health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: ok
