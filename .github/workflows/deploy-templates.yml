name: Deploy Templates to Production

on:
  push:
    branches:
      - main
    paths:
      - 'docker-templates/**'
      - '.github/workflows/deploy-templates.yml'
  workflow_dispatch:
    inputs:
      skip_approval:
        description: 'Skip approval gate (founder only)'
        required: false
        default: 'false'

env:
  VPS_HOST: '76.13.179.86'
  VPS_USER: 'root'
  VPS_PATH: '/root/dc1-platform'

jobs:
  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    outputs:
      template_count: ${{ steps.count.outputs.count }}
      validation_result: ${{ steps.validate.outcome }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Validate Templates
        id: validate
        run: node scripts/validate-templates.mjs

      - name: Count Templates
        id: count
        run: |
          COUNT=$(ls -1 docker-templates/*.json 2>/dev/null | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "✅ Template count: $COUNT"

  staging_test:
    name: Test on Staging (if applicable)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run Post-Deploy Verification
        run: node scripts/post-deploy-verify-templates.mjs
        continue-on-error: true

      - name: Test Result
        run: echo "✅ Staging tests completed (non-blocking)"

  approval_gate:
    name: Approval Gate (Manual)
    runs-on: ubuntu-latest
    needs: [validate, staging_test]
    if: ${{ needs.validate.outputs.validation_result == 'success' }}
    environment:
      name: production
      reviewers: ['founder']
    steps:
      - name: Create Approval Issue
        uses: actions/github-script@v7
        with:
          script: |
            const templateCount = '${{ needs.validate.outputs.template_count }}';
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 APPROVAL: Deploy ${templateCount} templates to production`,
              body: `## Template Deployment Approval Required

              **Templates to deploy:** ${templateCount}
              **Commit:** ${context.sha}
              **Branch:** ${context.ref}
              **Triggered by:** ${context.actor}

              ### Deployment Details
              - **Target:** Production VPS (76.13.179.86)
              - **Service:** dc1-provider-onboarding
              - **Strategy:** Zero-downtime reload
              - **Rollback:** Available (automated)

              ### Pre-Deployment Checks
              ✅ Template validation: PASS
              ✅ Schema compliance: PASS
              ✅ No duplicates: PASS

              ### Action Required
              Please review and approve:
              1. Changes are safe to deploy
              2. No active tenants will be affected
              3. Rollback procedure understood

              **Respond with:**
              - \`/approve\` to deploy
              - \`/deny\` to cancel
              - \`/comment\` for questions

              ---
              *This is an automated request. Do not modify.*`,
              labels: ['deploy', 'production', 'critical']
            });

            console.log(`✅ Created approval issue: ${issue.data.html_url}`);

      - name: Wait for Approval
        uses: trstringer/manual-approval@main
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: 'founder'
          minimum-approvals: 1
          issue-title: 'Production Deployment Approval'
          issue-body: 'See related issue for details'

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, approval_gate]
    if: ${{ needs.approval_gate.result == 'success' }}
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to Production
        run: |
          echo "🚀 Starting production deployment..."
          bash scripts/deploy-templates-production.sh
        env:
          SSH_USER: ${{ env.VPS_USER }}
          PROD_HOST: ${{ env.VPS_HOST }}

      - name: Verify Deployment
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run Post-Deploy Verification
        run: |
          echo "🔍 Running post-deployment verification..."
          node scripts/post-deploy-verify-templates.mjs

      - name: Rollback on Failure
        if: failure()
        run: |
          echo "⚠️  Deployment failed, initiating rollback..."
          bash scripts/rollback-templates.sh
        env:
          SSH_USER: ${{ env.VPS_USER }}
          PROD_HOST: ${{ env.VPS_HOST }}

      - name: Notify Success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **DEPLOYMENT SUCCESSFUL**

              **Deployed commit:** ${context.sha}
              **Templates:** ${{ needs.validate.outputs.template_count }}
              **Timestamp:** ${new Date().toISOString()}

              All post-deployment verification checks passed.
              System is operating normally.`,
              labels: ['deployment-success']
            })

      - name: Notify Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **DEPLOYMENT FAILED & ROLLED BACK**

              **Attempted commit:** ${context.sha}
              **Status:** Rollback completed successfully
              **Timestamp:** ${new Date().toISOString()}

              ⚠️ **ACTION REQUIRED:**
              1. Review failure logs above
              2. Identify root cause
              3. Fix and commit
              4. Request new deployment

              System has been rolled back to pre-deployment state.`,
              labels: ['deployment-failed']
            })

      - name: Create Deployment Record
        if: always()
        run: |
          echo "📝 Deployment Record"
          echo "==================="
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date -u)"
          echo "Status: ${{ job.status }}"
          echo "Actor: ${{ github.actor }}"
