name: Build & Push DC1 Docker Worker Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/docker/**'
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/dc1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push base-worker
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.base
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-base-worker:latest
            ${{ env.IMAGE_PREFIX }}-base-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push sd-worker
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.sd-worker
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-sd-worker:latest
            ${{ env.IMAGE_PREFIX }}-sd-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}-base-worker:latest

      - name: Build & push llm-worker
        uses: docker/build-push-action@v5
        with:
          context: backend/docker
          file: backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-llm-worker:latest
            ${{ env.IMAGE_PREFIX }}-llm-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}-base-worker:latest

      - name: List built images
        run: |
          echo "Built images:"
          echo "  ${{ env.IMAGE_PREFIX }}-base-worker:latest"
          echo "  ${{ env.IMAGE_PREFIX }}-sd-worker:latest"
          echo "  ${{ env.IMAGE_PREFIX }}-llm-worker:latest"
