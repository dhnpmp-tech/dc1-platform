name: Build & Push Instant-Tier Worker Images

on:
  push:
    branches:
      - main
    paths:
      - 'backend/docker/Dockerfile.llm-worker'
      - 'backend/docker/Dockerfile.sd-worker'
      - 'backend/docker/base-worker/**'
      - '.github/workflows/docker-instant-tier.yml'
  schedule:
    # Daily nightly build with full model pre-bake (2 AM UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_REGISTRY_PATH: dc1

jobs:
  build-llm-worker:
    runs-on: ubuntu-latest
    name: Build LLM Worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Determine build args
        id: buildargs
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "skip_prebake=0" >> $GITHUB_OUTPUT
            echo "build_tag=latest-fullbake" >> $GITHUB_OUTPUT
          else
            echo "skip_prebake=1" >> $GITHUB_OUTPUT
            echo "build_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push LLM worker
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_PATH }}/llm-worker:${{ steps.buildargs.outputs.build_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_PATH }}/llm-worker:latest
          build-args: |
            SKIP_MODEL_PREBAKE=${{ steps.buildargs.outputs.skip_prebake }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sd-worker:
    runs-on: ubuntu-latest
    name: Build SD Worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Determine build args
        id: buildargs
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "skip_prebake=0" >> $GITHUB_OUTPUT
            echo "build_tag=latest-fullbake" >> $GITHUB_OUTPUT
          else
            echo "skip_prebake=1" >> $GITHUB_OUTPUT
            echo "build_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push SD worker
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.sd-worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_PATH }}/sd-worker:${{ steps.buildargs.outputs.build_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY_PATH }}/sd-worker:latest
          build-args: |
            SKIP_MODEL_PREBAKE=${{ steps.buildargs.outputs.skip_prebake }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: [build-llm-worker, build-sd-worker]
    runs-on: ubuntu-latest
    if: always()
    name: Notify build status
    steps:
      - name: Check build results
        run: |
          if [[ "${{ needs.build-llm-worker.result }}" != "success" ]] || [[ "${{ needs.build-sd-worker.result }}" != "success" ]]; then
            echo "Build failed — check logs"
            exit 1
          fi
          echo "✅ Instant-tier worker images built and pushed successfully"
