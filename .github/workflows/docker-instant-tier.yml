name: Build & Publish Instant-Tier Worker Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker-templates/allam-7b-instruct.json'
      - 'docker-templates/falcon-h1-arabic-7b.json'
      - 'docker-templates/jais-13b-chat.json'
      - 'backend/docker/Dockerfile.base'
      - 'backend/docker/Dockerfile.llm-worker'
      - 'scripts/emit-instant-tier-manifest.mjs'
      - '.github/workflows/docker-instant-tier.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: dc1

concurrency:
  group: docker-instant-tier-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-instant-tier:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
    name: Publish instant-tier worker images
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Prepare image refs
        id: refs
        run: |
          echo "immutable_tag=sha-${GITHUB_SHA}-run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${REGISTRY}/${IMAGE_NAMESPACE}/base-worker" >> "$GITHUB_OUTPUT"
          echo "allam_ref=${REGISTRY}/${IMAGE_NAMESPACE}/instant-allam-7b-instruct" >> "$GITHUB_OUTPUT"
          echo "falcon_ref=${REGISTRY}/${IMAGE_NAMESPACE}/instant-falcon-h1-arabic-7b" >> "$GITHUB_OUTPUT"
          echo "jais_ref=${REGISTRY}/${IMAGE_NAMESPACE}/instant-jais-13b-chat" >> "$GITHUB_OUTPUT"

      - name: Build and push base worker
        id: build_base
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.base
          push: true
          tags: |
            ${{ steps.refs.outputs.base_ref }}:latest
            ${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}
          cache-from: type=gha,scope=instant-tier-base
          cache-to: type=gha,mode=max,scope=instant-tier-base

      - name: Build and push ALLaM 7B instant worker
        id: build_allam
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ steps.refs.outputs.allam_ref }}:latest
            ${{ steps.refs.outputs.allam_ref }}:${{ steps.refs.outputs.immutable_tag }}
          build-args: |
            BASE_IMAGE=${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}
            SKIP_MODEL_PREBAKE=0
            PREBAKE_MODEL=HUMAIN-AI/ALLaM-7B-Instruct
            INSTANT_TEMPLATE_ID=allam-7b-instruct
          cache-from: type=gha,scope=instant-tier-allam
          cache-to: type=gha,mode=max,scope=instant-tier-allam

      - name: Build and push Falcon H1 instant worker
        id: build_falcon
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ steps.refs.outputs.falcon_ref }}:latest
            ${{ steps.refs.outputs.falcon_ref }}:${{ steps.refs.outputs.immutable_tag }}
          build-args: |
            BASE_IMAGE=${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}
            SKIP_MODEL_PREBAKE=0
            PREBAKE_MODEL=tiiuae/Falcon-H1-7B-Instruct
            INSTANT_TEMPLATE_ID=falcon-h1-arabic-7b
          cache-from: type=gha,scope=instant-tier-falcon
          cache-to: type=gha,mode=max,scope=instant-tier-falcon

      - name: Build and push JAIS 13B instant worker
        id: build_jais
        uses: docker/build-push-action@v5
        with:
          context: ./backend/docker
          file: ./backend/docker/Dockerfile.llm-worker
          push: true
          tags: |
            ${{ steps.refs.outputs.jais_ref }}:latest
            ${{ steps.refs.outputs.jais_ref }}:${{ steps.refs.outputs.immutable_tag }}
          build-args: |
            BASE_IMAGE=${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}
            SKIP_MODEL_PREBAKE=0
            PREBAKE_MODEL=inceptionai/jais-13b-chat
            INSTANT_TEMPLATE_ID=jais-13b-chat
          cache-from: type=gha,scope=instant-tier-jais
          cache-to: type=gha,mode=max,scope=instant-tier-jais

      - name: Emit manifest
        run: |
          mkdir -p artifacts
          node scripts/emit-instant-tier-manifest.mjs artifacts/instant-tier-images.json
        env:
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ env.IMAGE_NAMESPACE }}
          INSTANT_TIER_IMAGE_SPECS: |
            [
              {
                "name": "instant-allam-7b-instruct",
                "template_id": "allam-7b-instruct",
                "model_id": "HUMAIN-AI/ALLaM-7B-Instruct",
                "digest": "${{ steps.build_allam.outputs.digest }}",
                "sha_tag": "${{ steps.refs.outputs.immutable_tag }}"
              },
              {
                "name": "instant-falcon-h1-arabic-7b",
                "template_id": "falcon-h1-arabic-7b",
                "model_id": "tiiuae/Falcon-H1-7B-Instruct",
                "digest": "${{ steps.build_falcon.outputs.digest }}",
                "sha_tag": "${{ steps.refs.outputs.immutable_tag }}"
              },
              {
                "name": "instant-jais-13b-chat",
                "template_id": "jais-13b-chat",
                "model_id": "inceptionai/jais-13b-chat",
                "digest": "${{ steps.build_jais.outputs.digest }}",
                "sha_tag": "${{ steps.refs.outputs.immutable_tag }}"
              }
            ]

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: instant-tier-image-manifest
          path: artifacts/instant-tier-images.json

      - name: Smoke pull and bootstrap ALLaM worker
        run: |
          docker pull "${{ steps.refs.outputs.allam_ref }}@${{ steps.build_allam.outputs.digest }}"
          docker run --rm \
            --entrypoint python \
            "${{ steps.refs.outputs.allam_ref }}@${{ steps.build_allam.outputs.digest }}" \
            -c "import torch, vllm; print('allam instant worker smoke ok')"

      - name: Smoke pull and bootstrap Falcon worker
        run: |
          docker pull "${{ steps.refs.outputs.falcon_ref }}@${{ steps.build_falcon.outputs.digest }}"
          docker run --rm \
            --entrypoint python \
            "${{ steps.refs.outputs.falcon_ref }}@${{ steps.build_falcon.outputs.digest }}" \
            -c "import torch, vllm; print('falcon instant worker smoke ok')"

      - name: Smoke pull and bootstrap JAIS worker
        run: |
          docker pull "${{ steps.refs.outputs.jais_ref }}@${{ steps.build_jais.outputs.digest }}"
          docker run --rm \
            --entrypoint python \
            "${{ steps.refs.outputs.jais_ref }}@${{ steps.build_jais.outputs.digest }}" \
            -c "import torch, vllm; print('jais instant worker smoke ok')"

      - name: Publish summary
        run: |
          {
            echo "## Instant-tier publish"
            echo ""
            echo "| Image | Mutable tag | Immutable ref | Digest | Templates |"
            echo "|---|---|---|---|---|"
            echo "| base-worker | \`${{ steps.refs.outputs.base_ref }}:latest\` | \`${{ steps.refs.outputs.base_ref }}:${{ steps.refs.outputs.immutable_tag }}\` | \`${{ steps.build_base.outputs.digest }}\` | runtime base |"
            echo "| instant-allam-7b-instruct | \`${{ steps.refs.outputs.allam_ref }}:latest\` | \`${{ steps.refs.outputs.allam_ref }}:${{ steps.refs.outputs.immutable_tag }}\` | \`${{ steps.build_allam.outputs.digest }}\` | allam-7b-instruct |"
            echo "| instant-falcon-h1-arabic-7b | \`${{ steps.refs.outputs.falcon_ref }}:latest\` | \`${{ steps.refs.outputs.falcon_ref }}:${{ steps.refs.outputs.immutable_tag }}\` | \`${{ steps.build_falcon.outputs.digest }}\` | falcon-h1-arabic-7b |"
            echo "| instant-jais-13b-chat | \`${{ steps.refs.outputs.jais_ref }}:latest\` | \`${{ steps.refs.outputs.jais_ref }}:${{ steps.refs.outputs.immutable_tag }}\` | \`${{ steps.build_jais.outputs.digest }}\` | jais-13b-chat |"
            echo ""
            echo "Manifest artifact: \`instant-tier-image-manifest\`"
          } >> "$GITHUB_STEP_SUMMARY"
