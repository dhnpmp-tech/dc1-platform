name: Runtime Route Parity Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run runtime route parity monitor
        run: npm run monitor:route-parity
        env:
          ROUTE_PARITY_BASE_URL: https://api.dcp.sa
          ROUTE_PARITY_ARTIFACT_DIR: ../docs/reports/runtime-parity
          ROUTE_PARITY_TIMEOUT_MS: '12000'
          ROUTE_PARITY_MAX_FAILURES: '0'
          ROUTE_PARITY_LATENCY_THRESHOLD_MS: '4000'
          ROUTE_PARITY_MAX_LATENCY_BREACHES: '0'

      - name: Upload parity report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-route-parity-report
          path: docs/reports/runtime-parity/*.json
          if-no-files-found: warn
