                        type: integer
                      total_jobs:
                        type: integer
                      completed_jobs:
                        type: integer
                      failed_jobs:
                        type: integer
                      active_jobs:
                        type: integer
                      total_revenue_halala:
                        type: integer
                      total_dc1_fees_halala:
                        type: integer
                      today_revenue_halala:
                        type: integer
                      today_jobs:
                        type: integer
                  gpu_breakdown:
                    type: array
                    items:
                      type: object
                  recent_signups:
                    type: array
                    items:
                      type: object
                  recent_heartbeats:
                    type: array
                    items:
                      type: object

  /api/admin/providers:
