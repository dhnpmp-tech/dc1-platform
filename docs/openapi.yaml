        - in: query
          name: search
          schema:
            type: string
      responses:
        '200':
          description: Renters list

  /api/admin/renters/{id}:
    get:
      tags: [Admin]
      summary: Full renter detail
      security:
        - AdminToken: []
      parameters:
        - in: path
          name: id
          required: true
