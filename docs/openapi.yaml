                          type: integer
                        vram_mib:
                          type: integer
                        gpu_count:
                          type: integer
                        driver_version:
                          type: string
                        compute_capability:
                          type: string
                        cuda_version:
                          type: string
                        status:
                          type: string
                        is_live:
                          type: boolean
                          description: True if heartbeat received within the last 120 seconds
                        location:
                          type: string
                          nullable: true
                        reliability_score:
                          type: number
                          nullable: true
                        cached_models:
                          type: array
                          items:
                            type: string
                  total:
                    type: integer

  /api/renters/balance:
    get:
      tags: [Renters]
      summary: Quick balance check
      security:
        - RenterApiKey: []
      parameters:
        - name: key
          in: query
          schema:
            type: string
        - name: x-renter-key
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Balance details
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance_halala:
                    type: integer
                  balance_sar:
                    type: number
                  held_halala:
                    type: integer
                    description: Estimated cost held for currently running jobs
                  held_sar:
                    type: number
                  available_halala:
                    type: integer
                  total_spent_halala:
                    type: integer
                  total_spent_sar:
                    type: number
                  total_jobs:
                    type: integer

  /api/renters/topup:
    post:
      tags: [Renters]
      summary: Direct balance top-up (dev/legacy — use /api/payments/topup for production)
      description: |
        Directly credits halala to renter balance. Accepts either `amount_halala`
        or `amount_sar`. Max 1000 SAR per transaction. Rate limited to 10/min.
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount_halala:
                  type: integer
                  description: Amount in halala (mutually exclusive with amount_sar)
                amount_sar:
                  type: number
                  description: Amount in SAR (mutually exclusive with amount_halala)
      responses:
        '200':
          description: Balance credited
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  topped_up_halala:
                    type: integer
                  topped_up_sar:
                    type: number
                  new_balance_halala:
                    type: integer
                  new_balance_sar:
                    type: number

  /api/renters/login-email:
    post:
      tags: [Renters]
      summary: Retrieve API key by email
      requestBody:
        required: true
