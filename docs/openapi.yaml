  # ─── Jobs ───────────────────────────────────────────────────────────────────

  /api/jobs/submit:
    post:
      tags: [Jobs]
      summary: Submit a compute job
      description: |
        Validates renter balance, deducts estimated cost as a pre-pay hold, assigns
        provider, and queues the job. Rate limited to 30/min.

        **Supported job types and cost rates (halala/min):**
        | Type | Rate |
        |------|------|
        | `llm-inference` | 15 |
        | `training` | 25 |
        | `rendering` | 20 |
        | `image_generation` | 20 |
        | `vllm_serve` | 20 |
        | `custom` | 10 |
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_type]
              properties:
                job_type:
                  type: string
                  enum: [llm-inference, llm_inference, training, rendering, image_generation, vllm_serve, custom]
                  example: image_generation
                duration_minutes:
                  type: integer
                  default: 10
                  description: Estimated runtime. Used for pre-pay cost calculation.
                task_spec:
                  type: object
                  description: |
                    Job-specific parameters. For supported types, the API auto-generates
                    the task script from these params (no custom Python needed).

                    **image_generation params:**
                    - `prompt` (string)
                    - `negative_prompt` (string)
                    - `steps` (int, 5–100)
                    - `width` / `height` (int, 256–1024)
                    - `seed` (int)
                    - `model` (enum — see allowed SD models)

                    **llm-inference params:**
                    - `prompt` (string)
                    - `max_tokens` (int, 32–4096)
                    - `temperature` (float, 0.1–2.0)
                    - `model` (enum — see allowed LLM models)
                gpu_requirements:
                  type: object
                  nullable: true
                  description: Optional GPU filter (min_vram_gb, gpu_model, etc.)
                max_duration_seconds:
                  type: integer
                  default: 1800
                  description: Hard timeout. Job is killed if it exceeds this.
                priority:
                  type: integer
                  enum: [1, 2, 3]
                  default: 2
                  description: "1=high, 2=normal, 3=low"
      responses:
        '201':
          description: Job submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  job_id:
                    type: string
                  status:
                    type: string
                    enum: [pending, queued]
                  provider_id:
                    type: integer
                    nullable: true
                  cost_halala:
                    type: integer
                  new_balance_halala:
                    type: integer
        '400':
          description: Invalid request (missing job_type, etc.)
        '402':
          description: Insufficient balance
        '503':
          description: No providers available

  /api/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Get job status and details
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
          description: Job UUID
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '403':
          description: Access denied (not your job)
        '404':
          description: Job not found

  /api/jobs/{job_id}/output:
    get:
      tags: [Jobs]
      summary: Fetch job output
      description: Returns the job result payload. For `image_generation`, includes base64-encoded PNG.
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job output
          content:
            application/json:
              schema:
                type: object
                description: Varies by job_type. For images contains `data` (base64 PNG). For text contains `response`.
        '404':
          description: Job not found or no output yet

  /api/jobs/{job_id}/output/{format}:
    get:
      tags: [Jobs]
      summary: Fetch job output in a specific format
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
        - in: path
          name: format
          required: true
          schema:
            type: string
            enum: [json, png, raw]
      responses:
        '200':
          description: Job output in requested format

  /api/jobs/{job_id}/logs:
    get:
      tags: [Jobs]
      summary: Get job execution logs
      security:
        - RenterApiKey: []
        - ProviderApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
    post:
      tags: [Jobs]
      summary: Daemon appends log entries for a job
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                logs:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Logs appended

  /api/jobs/{job_id}/progress:
    post:
      tags: [Jobs]
      summary: Daemon reports job progress
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                progress_pct:
                  type: number
                  minimum: 0
                  maximum: 100
                phase:
                  type: string
                  description: Phase marker (e.g. downloading_model, generating)
      responses:
        '200':
          description: Progress recorded

  /api/jobs/{job_id}/endpoint-ready:
    post:
      tags: [Jobs]
      summary: Daemon signals that a long-running endpoint is ready
      description: Used by `vllm_serve` jobs to announce the inference endpoint URL.
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                endpoint_url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Endpoint URL stored

  /api/jobs/{job_id}/complete:
    post:
      tags: [Jobs]
      summary: Mark job as complete (daemon)
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                result:
                  description: Job output payload
      responses:
        '200':
          description: Job completed, billing settled

  /api/jobs/{job_id}/fail:
    post:
      tags: [Jobs]
      summary: Mark job as failed (daemon)
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key:
                  type: string
                error:
                  type: string
      responses:
        '200':
          description: Job failed, renter refunded

  /api/jobs/{job_id}/cancel:
    post:
      tags: [Jobs]
      summary: Cancel a job
      security:
        - RenterApiKey: []
        - AdminToken: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled

  /api/jobs/history:
    get:
      tags: [Jobs]
      summary: Job history for a renter
      security:
        - RenterApiKey: []
      parameters:
        - in: query
          name: key
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated job history
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                      offset:
                        type: integer
                      total:
                        type: integer

  /api/jobs/assigned:
    get:
      tags: [Jobs]
      summary: Get jobs assigned to a provider (daemon polling)
      security:
        - ProviderApiKey: []
      responses:
        '200':
          description: Assigned jobs list

  /api/jobs/active:
    get:
      tags: [Jobs]
      summary: Get currently running jobs
      security:
        - AdminToken: []
      responses:
        '200':
          description: Active jobs

  /api/jobs/queue/{provider_id}:
    get:
      tags: [Jobs]
      summary: View queue for a specific provider
      security:
        - AdminToken: []
      parameters:
        - in: path
          name: provider_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Queued jobs for provider

  # ─── Payments ───────────────────────────────────────────────────────────────

  /api/payments/topup:
    post:
      tags: [Payments]
      summary: Initiate a Moyasar SAR payment
      description: |
        Creates a Moyasar payment and returns a hosted checkout URL. Renter must
        be redirected to `checkout_url` to complete payment. The webhook confirms
        and credits the balance. Rate limited to 10/min.
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_sar]
              properties:
                amount_sar:
                  type: number
                  minimum: 1
                  maximum: 10000
                  example: 100
                source_type:
                  type: string
                  enum: [creditcard, mada, applepay]
                  default: creditcard
                callback_url:
                  type: string
                  format: uri
                  nullable: true
                  description: Override default redirect URL after payment
      responses:
        '200':
          description: Payment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  payment_id:
                    type: string
                  amount_sar:
                    type: number
                  amount_halala:
                    type: integer
                  status:
                    type: string
                  checkout_url:
                    type: string
                    format: uri
                  message:
                    type: string
        '503':
          description: Payment gateway not configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  sandbox_hint:
                    type: string

  /api/payments/topup-sandbox:
    post:
      tags: [Payments]
      summary: Dev-only sandbox balance top-up
      description: |
        Directly credits balance without Moyasar. Only available when
        `MOYASAR_SECRET_KEY` is **not** set (dev/staging environments). Disabled in production.
      security:
        - RenterApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_sar]
              properties:
                amount_sar:
                  type: number
                  minimum: 0.01
                  maximum: 10000
      responses:
        '200':
          description: Balance credited (sandbox)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  sandbox:
                    type: boolean
                  payment_id:
                    type: string
                  amount_sar:
                    type: number
                  credited_halala:
                    type: integer
                  new_balance_sar:
                    type: number
                  new_balance_halala:
                    type: integer
        '403':
          description: Sandbox disabled in production

  /api/payments/webhook:
    post:
      tags: [Payments]
      summary: Moyasar payment webhook
      description: |
        Receives payment events from Moyasar. Verifies HMAC-SHA256 signature
        (`x-moyasar-signature` header). Credits balance on `paid` event.
        Must return 2xx or Moyasar will retry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Moyasar payment ID
                status:
                  type: string
                  enum: [initiated, paid, failed, refunded]
                amount:
                  type: integer
                  description: Amount in halala
                amount_refunded:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Webhook acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                  action:
                    type: string
                    enum: [balance_credited, marked_failed, refund_processed, already_processed, ignored_unknown, status_updated]
        '401':
          description: Invalid HMAC signature

  /api/payments/verify/{paymentId}:
    get:
      tags: [Payments]
      summary: Verify payment status (post-redirect polling)
      description: Fetches live status from Moyasar. Used by frontend to poll after redirect back from checkout.
      security:
        - RenterApiKey: []
      parameters:
        - in: path
          name: paymentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          description: Payment not found or not owned by this renter

  /api/payments/history:
    get:
      tags: [Payments]
      summary: Renter payment history
      security:
        - RenterApiKey: []
      parameters:
        - in: query
          name: key
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Paginated payment history
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                      offset:
                        type: integer
                      total:
                        type: integer
                  summary:
                    type: object
                    properties:
                      total_paid_sar:
                        type: number
                      total_paid_halala:
                        type: integer

