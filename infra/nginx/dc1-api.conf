# DC1 API — nginx reverse proxy with HTTPS / Let's Encrypt
# Place at: /etc/nginx/sites-available/dc1-api
# Enable with: ln -s /etc/nginx/sites-available/dc1-api /etc/nginx/sites-enabled/dc1-api
#
# Variables (set by setup-https.sh or replace manually):
#   DOMAIN  — e.g. api.dcp.sa
#   PORT    — Express API port (default 8083)

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.dcp.sa;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS reverse proxy ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dcp.sa;

    # Let's Encrypt certificates (provisioned by certbot)
    ssl_certificate     /etc/letsencrypt/live/api.dcp.sa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dcp.sa/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.dcp.sa/chain.pem;

    # Modern SSL settings (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload size limit (for base64 image job results ~50 MB)
    client_max_body_size 60m;

    # Timeouts for long-running AI jobs (up to 15 min)
    proxy_connect_timeout 30s;
    proxy_send_timeout    900s;
    proxy_read_timeout    900s;

    # Proxy to Express API
    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future live job streaming)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
