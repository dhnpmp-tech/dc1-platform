<!doctype html>
<html lang="en" dir="ltr" data-palette="midnight">
<head>
<meta charset="utf-8">
<title>Settings — DCP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/dcp-kit.css">
<style>
  html[data-palette="midnight"] body { background: var(--bg); }
  body { margin: 0; font-family: var(--sans); color: var(--ink); overflow: hidden; }

  /* shared app grid — matches Console */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    grid-template-areas: "sidebar topbar" "sidebar main";
    height: 100vh;
  }

  /* sidebar / topbar reuse same styles as Console — copy the pieces we need */
  .sb { grid-area: sidebar; background: var(--paper); border-inline-end: 1px solid var(--hair); display: flex; flex-direction: column; overflow: hidden; }
  .sb-head { padding: 16px 18px; border-bottom: 1px solid var(--hair); display: flex; align-items: center; gap: 10px; }
  .sb-head .mark { width: 28px; height: 28px; background: linear-gradient(135deg, var(--orange) 0%, #b84510 100%); display: flex; align-items: center; justify-content: center; color: var(--bg); font-family: var(--serif); font-size: 16px; }
  .sb-head .name { font-family: var(--serif); font-size: 20px; color: var(--ink); letter-spacing: -.005em; }
  .sb-head .env { font-family: var(--mono); font-size: 9.5px; letter-spacing: .12em; padding: 3px 6px; border: 1px solid var(--hair); color: var(--mut); margin-inline-start: auto; }
  .org-switcher { padding: 12px 12px; border-bottom: 1px solid var(--hair); }
  .org-btn { width: 100%; display: grid; grid-template-columns: 32px 1fr 16px; gap: 10px; padding: 10px 12px; border: 1px solid var(--hair); background: var(--bg); cursor: pointer; text-align: start; align-items: center; }
  .org-btn .ol { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--bg); }
  .org-btn .on { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .org-btn .on .t { font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .org-btn .on .s { font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--mut); text-transform: uppercase; }
  .org-btn .chev { color: var(--mut); font-size: 10px; }
  .sb-nav { flex: 1; overflow-y: auto; padding: 12px 10px; }
  .sb-nav .section { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--mut); text-transform: uppercase; padding: 18px 10px 8px; }
  .sb-nav .section:first-child { padding-top: 6px; }
  .sb-item { display: grid; grid-template-columns: 16px 1fr auto; align-items: center; gap: 12px; padding: 9px 12px; color: var(--ink-2); text-decoration: none; font-size: 13.5px; cursor: pointer; margin-bottom: 1px; }
  .sb-item:hover { background: var(--bg-2); color: var(--ink); }
  .sb-item.on { background: var(--ink); color: var(--bg); }
  .sb-item .ic { opacity: .7; font-family: var(--mono); font-size: 12px; }
  .sb-item .bd { font-family: var(--mono); font-size: 9.5px; padding: 2px 5px; border: 1px solid var(--hair); color: var(--mut); letter-spacing: .08em; }
  .sb-item.on .bd { background: color-mix(in oklab, var(--orange) 40%, transparent); color: var(--orange); border-color: transparent; }
  .sb-foot { padding: 14px 14px; border-top: 1px solid var(--hair); display: flex; gap: 10px; align-items: center; }
  .sb-foot .avatar { width: 32px; height: 32px; background: var(--bg-2); color: var(--orange); font-family: var(--serif); font-size: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--hair); }
  .sb-foot .who { font-size: 13px; color: var(--ink); min-width: 0; }
  .sb-foot .who .e { font-family: var(--mono); font-size: 10px; color: var(--mut); letter-spacing: .04em; display: block; margin-top: 2px; max-width: 160px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

  .tb { grid-area: topbar; background: var(--bg); border-bottom: 1px solid var(--hair); display: flex; align-items: center; padding: 0 32px; gap: 20px; }
  .tb-crumb { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 11px; letter-spacing: .1em; color: var(--mut); white-space: nowrap; }
  .tb-crumb .sep { color: var(--dim); }
  .tb-crumb .cur { color: var(--ink); text-transform: uppercase; }
  .tb-actions { margin-inline-start: auto; display: flex; gap: 10px; align-items: center; }
  .tb .env-pill { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; padding: 5px 10px; border: 1px solid var(--hair); color: var(--ink-2); text-transform: uppercase; }
  .tb .env-pill.prod { color: var(--orange); border-color: color-mix(in oklab, var(--orange) 40%, transparent); background: color-mix(in oklab, var(--orange) 8%, transparent); }

  /* MAIN */
  .main { grid-area: main; overflow-y: auto; background: var(--bg); }

  .set-head {
    padding: 32px 40px 0; border-bottom: 1px solid var(--hair);
  }
  .set-head .eb { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; color: var(--mut); text-transform: uppercase; }
  .set-head h1 { font-family: var(--serif); font-weight: 400; font-size: 52px; line-height: 1.05; color: var(--ink); margin: 10px 0 8px; letter-spacing: -.01em; }
  .set-head h1 em { color: var(--orange); font-style: italic; }
  .set-head p { color: var(--ink-2); font-size: 15px; margin: 0 0 28px; max-width: 56ch; }

  .set-tabs {
    display: flex; gap: 0; margin-top: 24px;
  }
  .set-tabs .tab {
    padding: 14px 22px 14px 0; margin-inline-end: 28px; cursor: pointer;
    font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--mut); border-bottom: 2px solid transparent; margin-bottom: -1px;
    display: flex; align-items: center; gap: 10px;
  }
  .set-tabs .tab:hover { color: var(--ink); }
  .set-tabs .tab.on { color: var(--ink); border-bottom-color: var(--orange); }
  .set-tabs .tab .num { font-size: 10px; color: var(--mut); }
  .set-tabs .tab.on .num { color: var(--orange); }

  .set-body { padding: 40px; max-width: 1100px; }

  /* Section header inside a tab */
  .sect-h { margin: 0 0 20px; display: flex; justify-content: space-between; align-items: flex-end; }
  .sect-h h2 { font-family: var(--serif); font-weight: 400; font-size: 28px; color: var(--ink); margin: 0 0 4px; letter-spacing: -.005em; }
  .sect-h .d { color: var(--ink-2); font-size: 14px; }

  /* Card */
  .card { border: 1px solid var(--hair); background: var(--paper); padding: 28px 32px; margin-bottom: 22px; }
  .card h3 { font-family: var(--serif); font-weight: 400; font-size: 22px; color: var(--ink); margin: 0 0 4px; letter-spacing: -.005em; }
  .card .cd { color: var(--ink-2); font-size: 13.5px; margin: 0 0 20px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.wide { grid-template-columns: 1fr; }

  /* profile header card */
  .prof-head { display: grid; grid-template-columns: 120px 1fr auto; gap: 28px; align-items: center; }
  .prof-head .avatar { width: 120px; height: 120px; background: var(--bg-2); border: 1px solid var(--hair); color: var(--orange); font-family: var(--serif); font-size: 48px; display: flex; align-items: center; justify-content: center; }
  .prof-head .who h3 { font-size: 28px; margin: 0 0 4px; }
  .prof-head .who .e { font-family: var(--mono); font-size: 12px; color: var(--mut); letter-spacing: .04em; }
  .prof-head .who .m { color: var(--ink-2); font-size: 13.5px; margin-top: 10px; display: flex; gap: 16px; flex-wrap: wrap; }
  .prof-head .who .m span { display: flex; align-items: center; gap: 6px; }

  /* Nafath verified badge */
  .verified-inline {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .08em;
    color: var(--ok); background: color-mix(in oklab, var(--ok) 10%, transparent);
    padding: 4px 8px; margin-inline-start: 6px;
  }

  /* Danger zone */
  .danger { border: 1px solid var(--err); background: color-mix(in oklab, var(--err) 4%, var(--paper)); padding: 24px 28px; margin-top: 32px; }
  .danger h3 { color: var(--err); font-family: var(--mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; margin: 0 0 10px; }
  .danger .row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid color-mix(in oklab, var(--err) 20%, var(--hair)); }
  .danger .row:first-of-type { border-top: none; }
  .danger .row .t { color: var(--ink); font-size: 14px; }
  .danger .row .s { color: var(--mut); font-size: 12px; margin-top: 2px; }
  .danger .row .btn-d { border: 1px solid var(--err); color: var(--err); padding: 8px 14px; font-family: var(--mono); font-size: 11px; letter-spacing: .1em; background: transparent; cursor: pointer; text-transform: uppercase; }
  .danger .row .btn-d:hover { background: var(--err); color: var(--bg); }

  /* TEAM */
  .member-row {
    display: grid; grid-template-columns: 40px 1fr 140px 120px 40px; gap: 16px; align-items: center;
    padding: 16px 22px; border-top: 1px solid var(--hair);
  }
  .member-row:first-child { border-top: none; }
  .member-row .av { width: 40px; height: 40px; background: var(--bg-2); color: var(--orange); font-family: var(--serif); font-size: 16px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--hair); }
  .member-row .n { color: var(--ink); font-size: 14px; }
  .member-row .e { font-family: var(--mono); font-size: 11px; color: var(--mut); letter-spacing: .02em; margin-top: 2px; }
  .member-row .role {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; color: var(--ink-2);
    padding: 4px 10px; border: 1px solid var(--hair); width: fit-content; text-transform: uppercase;
  }
  .member-row .role.owner { color: var(--orange); border-color: color-mix(in oklab, var(--orange) 50%, transparent); background: color-mix(in oklab, var(--orange) 8%, transparent); }
  .member-row .role.admin { color: var(--teal); border-color: color-mix(in oklab, var(--teal) 50%, transparent); background: color-mix(in oklab, var(--teal) 8%, transparent); }
  .member-row .la { font-family: var(--mono); font-size: 11px; color: var(--mut); letter-spacing: .02em; }
  .member-row .dots { color: var(--mut); cursor: pointer; font-size: 16px; text-align: center; }
  .member-row .dots:hover { color: var(--ink); }
  .member-row .pending { color: var(--warn); font-family: var(--mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; }

  /* invite inline */
  .invite-bar { display: grid; grid-template-columns: 1fr 160px auto; gap: 10px; padding: 18px 22px; border-top: 1px solid var(--hair); background: var(--bg-2); }
  .invite-bar .input { border-radius: 0; }

  /* BILLING */
  .bill-hero {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--hair); background: var(--paper);
  }
  .bill-hero .pane { padding: 28px 32px; border-inline-end: 1px solid var(--hair); }
  .bill-hero .pane:last-child { border-inline-end: none; }
  .bill-hero .pane .k { font-family: var(--mono); font-size: 10.5px; color: var(--mut); letter-spacing: .12em; text-transform: uppercase; }
  .bill-hero .pane .v { font-family: var(--serif); font-size: 46px; color: var(--ink); margin: 10px 0 4px; line-height: 1; }
  .bill-hero .pane .v em { color: var(--orange); font-style: italic; }
  .bill-hero .pane .unit { font-family: var(--mono); font-size: 14px; color: var(--mut); margin-inline-start: 8px; letter-spacing: .04em; }
  .bill-hero .pane .s { font-family: var(--mono); font-size: 11px; color: var(--mut); letter-spacing: .04em; margin-top: 4px; }

  /* payment methods */
  .pm-list .pm {
    display: grid; grid-template-columns: 60px 1fr auto auto; gap: 16px; align-items: center;
    padding: 16px 22px; border-top: 1px solid var(--hair);
  }
  .pm-list .pm:first-child { border-top: none; }
  .pm-list .pm .logo {
    width: 60px; height: 40px; border: 1px solid var(--hair); display: flex;
    align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px;
    color: var(--ink); letter-spacing: .08em; background: var(--bg);
  }
  .pm-list .pm .logo.mada { background: #1f2040; color: #fff; }
  .pm-list .pm .logo.stc { background: #4f0070; color: #fff; }
  .pm-list .pm .logo.visa { color: #1a1f71; font-weight: 700; font-family: var(--sans); font-size: 14px; font-style: italic; }
  .pm-list .pm .info .n { color: var(--ink); font-size: 14px; }
  .pm-list .pm .info .e { font-family: var(--mono); font-size: 11px; color: var(--mut); letter-spacing: .02em; margin-top: 2px; }
  .pm-list .pm .default { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--ok); border: 1px solid color-mix(in oklab, var(--ok) 40%, transparent); background: color-mix(in oklab, var(--ok) 8%, transparent); padding: 4px 8px; text-transform: uppercase; }
  .pm-list .pm .dots { color: var(--mut); cursor: pointer; }

  /* invoice table */
  .inv-table { width: 100%; border-collapse: collapse; }
  .inv-table th { font-family: var(--mono); font-size: 10.5px; letter-spacing: .12em; color: var(--mut); text-align: start; padding: 12px 22px; background: var(--bg-2); text-transform: uppercase; font-weight: 500; border-bottom: 1px solid var(--hair); }
  .inv-table td { padding: 16px 22px; font-size: 13.5px; color: var(--ink); border-top: 1px solid var(--hair); }
  .inv-table td.mono { font-family: var(--mono); font-size: 12px; color: var(--ink-2); letter-spacing: .02em; }
  .inv-table td .status { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; padding: 3px 8px; text-transform: uppercase; }
  .inv-table td .status.paid { color: var(--ok); background: color-mix(in oklab, var(--ok) 10%, transparent); }
  .inv-table td .status.open { color: var(--warn); background: color-mix(in oklab, var(--warn) 10%, transparent); }
  .inv-table td .dl { font-family: var(--mono); font-size: 11px; color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--hair); padding-bottom: 1px; }
  .inv-table td .dl:hover { color: var(--orange); border-color: var(--orange); }

  /* API KEYS */
  .key-row {
    display: grid; grid-template-columns: 1fr 120px 160px 120px 40px; gap: 16px; align-items: center;
    padding: 16px 22px; border-top: 1px solid var(--hair);
  }
  .key-row:first-child { border-top: none; }
  .key-row .knm { color: var(--ink); font-size: 14px; }
  .key-row .kv { font-family: var(--mono); font-size: 12px; color: var(--ink-2); letter-spacing: 0; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .key-row .kv .copy { color: var(--mut); cursor: pointer; padding: 2px 6px; border: 1px solid var(--hair); font-size: 10px; letter-spacing: .06em; }
  .key-row .kv .copy:hover { color: var(--ink); border-color: var(--ink); }
  .key-row .scope { font-family: var(--mono); font-size: 10.5px; letter-spacing: .08em; padding: 4px 10px; border: 1px solid var(--hair); color: var(--ink-2); width: fit-content; text-transform: uppercase; }
  .key-row .scope.prod { color: var(--orange); border-color: color-mix(in oklab, var(--orange) 40%, transparent); background: color-mix(in oklab, var(--orange) 6%, transparent); }
  .key-row .scope.stg { color: var(--info); border-color: color-mix(in oklab, var(--info) 40%, transparent); }
  .key-row .lu { font-family: var(--mono); font-size: 11px; color: var(--mut); }
  .key-row .st { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; padding: 3px 8px; text-transform: uppercase; width: fit-content; }
  .key-row .st.active { color: var(--ok); background: color-mix(in oklab, var(--ok) 10%, transparent); }
  .key-row .st.revoked { color: var(--mut); background: var(--bg-2); text-decoration: line-through; }
  .key-row .dots { color: var(--mut); cursor: pointer; text-align: center; }

  .new-key-btn { margin-inline-start: auto; }

  /* page-return strip */
  .return-strip { position: fixed; bottom: 14px; inset-inline-end: 14px; z-index: 60; display: flex; gap: 6px; font-family: var(--mono); font-size: 10px; letter-spacing: .1em; }
  .return-strip a { padding: 7px 11px; background: var(--ink); border: 1px solid var(--ink); color: var(--bg); text-decoration: none; text-transform: uppercase; white-space: nowrap; opacity: .88; }
  .return-strip a:hover { opacity: 1; background: var(--orange); border-color: var(--orange); }
</style>
</head>
