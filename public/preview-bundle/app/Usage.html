<!doctype html>
<html lang="en" dir="ltr" data-palette="midnight">
<head>
<meta charset="utf-8">
<title>Usage — DCP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/app-i18n-rtl.css">
<style>
  .u-toolbar {
    display: flex; gap: 10px; align-items: center; margin-bottom: 22px; padding: 10px 14px;
    border: 1px solid var(--hair); background: var(--paper);
  }
  .u-toolbar .k { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--mut); text-transform: uppercase; margin-inline-end: 2px; }
  .u-toolbar .chip {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .08em; padding: 5px 12px;
    border: 1px solid var(--hair); background: var(--bg); cursor: pointer; color: var(--ink-2); text-transform: uppercase;
  }
  .u-toolbar .chip:hover { border-color: var(--ink); color: var(--ink); }
  .u-toolbar .chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .u-toolbar .spacer { flex: 1; }
  .u-toolbar select, .u-toolbar button.ex {
    padding: 7px 14px; font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
    border: 1px solid var(--hair); background: var(--bg); color: var(--ink); cursor: pointer;
  }
  .u-toolbar button.ex:hover { border-color: var(--ink); background: var(--ink); color: var(--bg); }

  /* KPI row */
  .u-kpi { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border: 1px solid var(--hair); background: var(--paper); margin-bottom: 24px; }
  .u-kpi .s { padding: 22px 24px; border-inline-end: 1px solid var(--hair); }
  .u-kpi .s:last-child { border-inline-end: none; }
  .u-kpi .s .k { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--mut); text-transform: uppercase; }
  .u-kpi .s .v { font-family: var(--serif); font-size: 38px; line-height: 1; margin: 10px 0 4px; color: var(--ink); letter-spacing: -.005em; }
  .u-kpi .s .v em { color: var(--orange); font-style: italic; }
  .u-kpi .s .v .u { font-family: var(--sans); color: var(--mut); font-size: 14px; margin-inline-start: 4px; font-style: normal; letter-spacing: 0; }
  .u-kpi .s .sub { font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--mut); }
  .u-kpi .s .sub.pos { color: var(--ok); }
  .u-kpi .s .sub.neg { color: var(--err); }
  @media (max-width: 1100px) { .u-kpi { grid-template-columns: repeat(2, 1fr); } .u-kpi .s { border-inline-end: 1px solid var(--hair); border-bottom: 1px solid var(--hair); } .u-kpi .s:nth-child(2n) { border-inline-end: none; } }

  /* Section heading */
  .u-sec-hd { display: flex; justify-content: space-between; align-items: baseline; margin: 8px 0 14px; }
  .u-sec-hd h2 { font-family: var(--serif); font-weight: 400; font-size: 28px; letter-spacing: -.005em; color: var(--ink); margin: 0; }
  .u-sec-hd h2 em { color: var(--orange); font-style: italic; }
  .u-sec-hd .eb { font-family: var(--mono); font-size: 10.5px; letter-spacing: .12em; color: var(--mut); text-transform: uppercase; }

  /* stacked chart */
  .u-chart-wrap { padding: 24px; border: 1px solid var(--hair); background: var(--paper); margin-bottom: 24px; }
  .u-chart-legend { display: flex; gap: 18px; margin-bottom: 16px; font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--mut); text-transform: uppercase; }
  .u-chart-legend .sw { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
  .u-chart-legend .sw .c { width: 12px; height: 12px; }
  .u-chart-legend .sw.off { opacity: .35; }
  .u-chart-legend .spacer { flex: 1; }
  .u-chart-legend .tot { color: var(--ink); }

  .u-chart { position: relative; }
  .u-chart svg { width: 100%; height: auto; display: block; }
  .u-chart .tooltip {
    position: absolute; background: var(--ink); color: var(--bg); padding: 10px 12px;
    font-family: var(--mono); font-size: 10.5px; letter-spacing: .02em; line-height: 1.55;
    pointer-events: none; min-width: 200px; z-index: 20; transform: translate(-50%, -100%);
    margin-top: -10px;
  }
  .u-chart .tooltip .d { color: var(--orange); margin-bottom: 4px; letter-spacing: .08em; }
  .u-chart .tooltip .r { display: flex; justify-content: space-between; gap: 12px; }
  .u-chart .tooltip .r .dot { width: 8px; height: 8px; display: inline-block; margin-inline-end: 6px; vertical-align: 1px; }

  /* 2-col grid for model/key breakdowns */
  .u-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  @media (max-width: 1100px) { .u-grid-2 { grid-template-columns: 1fr; } }

  /* breakdown table */
  .u-bd { border: 1px solid var(--hair); background: var(--paper); }
  .u-bd-hd {
    padding: 16px 22px 14px; border-bottom: 1px solid var(--hair);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .u-bd-hd h3 { font-family: var(--serif); font-weight: 400; font-size: 20px; margin: 0; letter-spacing: -.005em; }
  .u-bd-hd .sub { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--mut); text-transform: uppercase; }
  .u-bd-row {
    padding: 14px 22px; border-top: 1px solid var(--hair);
    display: grid; grid-template-columns: 1fr 80px 120px;
    gap: 14px; align-items: center;
  }
  .u-bd-row:first-of-type { border-top: none; }
  .u-bd-row .nm { font-family: var(--mono); font-size: 12px; color: var(--ink); letter-spacing: .02em; }
  .u-bd-row .nm .sub { font-family: var(--mono); font-size: 9.5px; color: var(--mut); letter-spacing: .04em; margin-top: 3px; display: block; text-transform: uppercase; }
  .u-bd-row .pc { font-family: var(--mono); font-size: 11px; color: var(--ink-2); letter-spacing: .02em; text-align: end; }
  .u-bd-row .val { font-family: var(--mono); font-size: 11.5px; color: var(--ink); letter-spacing: .02em; text-align: end; }
  .u-bd-row .val .u { font-family: var(--sans); font-size: 10px; color: var(--mut); margin-inline-start: 3px; }
  .u-bd-row .bar { grid-column: 1 / -1; height: 3px; background: var(--bg-2); position: relative; margin-top: 8px; }
  .u-bd-row .bar .f { position: absolute; inset: 0; right: auto; background: var(--orange); }
  .u-bd-row .bar .f.c2 { background: var(--teal); }
  .u-bd-row .bar .f.c3 { background: var(--ink); opacity: .55; }
  .u-bd-row .bar .f.c4 { background: #7a6a56; }

  /* heatmap */
  .u-heat-wrap { padding: 24px; border: 1px solid var(--hair); background: var(--paper); margin-bottom: 24px; }
  .u-heat {
    display: grid; grid-template-columns: 60px repeat(24, 1fr); gap: 2px; margin-top: 10px;
  }
  .u-heat .day-label { font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; color: var(--mut); text-transform: uppercase; display: flex; align-items: center; }
  .u-heat .cell { aspect-ratio: 1; position: relative; cursor: pointer; }
  .u-heat .cell:hover { outline: 1px solid var(--ink); outline-offset: 2px; z-index: 5; }
  .u-heat-hours {
    display: grid; grid-template-columns: 60px repeat(24, 1fr); gap: 2px; margin-top: 8px;
    font-family: var(--mono); font-size: 9px; color: var(--mut); letter-spacing: .04em;
  }
  .u-heat-hours .hr { text-align: center; }
  .u-heat-legend {
    display: flex; align-items: center; gap: 8px; margin-top: 14px;
    font-family: var(--mono); font-size: 9.5px; color: var(--mut); letter-spacing: .08em; text-transform: uppercase;
  }
  .u-heat-legend .scale { display: flex; gap: 2px; }
  .u-heat-legend .scale .c { width: 16px; height: 12px; }

  /* budget pacing */
  .u-budget { padding: 24px; border: 1px solid var(--hair); background: var(--paper); margin-bottom: 24px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; align-items: center; }
  @media (max-width: 1000px) { .u-budget { grid-template-columns: 1fr; } }
  .u-budget .info .k { font-family: var(--mono); font-size: 10px; letter-spacing: .14em; color: var(--mut); text-transform: uppercase; }
  .u-budget .info .v { font-family: var(--serif); font-size: 54px; line-height: 1; margin: 10px 0 8px; color: var(--ink); letter-spacing: -.01em; }
  .u-budget .info .v em { color: var(--orange); font-style: italic; }
  .u-budget .info .v .of { font-family: var(--sans); font-size: 18px; color: var(--mut); letter-spacing: 0; font-style: normal; margin-inline-start: 8px; }
  .u-budget .info .s { font-family: var(--mono); font-size: 11px; color: var(--mut); letter-spacing: .04em; line-height: 1.7; }
  .u-budget .info .s .hi { color: var(--warn); }
  .u-meter { position: relative; }
  .u-meter .bar { height: 14px; background: var(--bg-2); border: 1px solid var(--hair); position: relative; }
  .u-meter .bar .fill {
    position: absolute; inset: -1px -1px -1px -1px; right: auto;
    background: linear-gradient(90deg, var(--teal) 0%, var(--orange) 80%, var(--err) 100%);
  }
  .u-meter .pace {
    position: absolute; top: -6px; bottom: -6px; width: 2px; background: var(--ink);
  }
  .u-meter .pace::after {
    content: "PACE"; position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-family: var(--mono); font-size: 9px; letter-spacing: .1em; color: var(--ink); white-space: nowrap;
  }
  .u-meter .ticks { display: flex; justify-content: space-between; margin-top: 8px; font-family: var(--mono); font-size: 10px; color: var(--mut); letter-spacing: .06em; }

</style>
</head>

</body>
