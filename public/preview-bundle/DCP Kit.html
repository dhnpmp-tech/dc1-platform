<!doctype html>
<html lang="en" dir="ltr" data-lang="en" data-palette="midnight">
<head>
<meta charset="utf-8">
<title>DCP Design Kit — reference sheet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/dcp-kit.css">
<style>
  /* Demo-page only — never copied into screens */
  .demo-shell { max-width:1280px; margin:0 auto; padding:48px 32px 120px; }
  .demo-hd { border-bottom:1px solid var(--hair); padding-bottom:32px; margin-bottom:48px; display:grid; grid-template-columns:1fr auto; gap:24px; align-items:end; }
  .demo-hd h1 { font-family:var(--serif); font-weight:400; font-size:72px; line-height:.95; margin:0 0 12px; letter-spacing:-.02em; }
  .demo-hd p  { color:var(--mut); max-width:60ch; margin:0; font-size:15px; line-height:1.55; }
  .demo-toc { font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); display:grid; gap:6px; text-align:end; }
  .demo-toc a { color:var(--mut); }
  .demo-toc a:hover { color:var(--ink); }

  .demo-sec { margin-top:72px; scroll-margin-top:20px; }
  .demo-sec > h2 { font-family:var(--serif); font-weight:400; font-size:44px; line-height:1; letter-spacing:-.01em; margin:0 0 8px; }
  .demo-sec > .demo-sec-sub { color:var(--mut); font-size:14px; margin:0 0 32px; max-width:70ch; }

  .demo-block { border:1px solid var(--hair); background:var(--paper); margin:20px 0 0; }
  .demo-block-hd {
    display:flex; justify-content:space-between; gap:16px; padding:10px 16px;
    border-bottom:1px solid var(--hair);
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut);
  }
  .demo-block-hd b { color:var(--ink); font-weight:500; letter-spacing:.14em; }
  .demo-block-body { padding:28px; display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .demo-block-body.col { flex-direction:column; align-items:stretch; gap:20px; }
  .demo-block-body.inset { background:var(--bg-2); }
  .demo-block-body.flush { padding:0; }
  .demo-grid { display:grid; gap:24px; }
  .demo-grid.g2 { grid-template-columns:1fr 1fr; }
  .demo-grid.g3 { grid-template-columns:repeat(3,1fr); }
  .demo-grid.g4 { grid-template-columns:repeat(4,1fr); }
  @media (max-width:960px){ .demo-grid.g2, .demo-grid.g3, .demo-grid.g4 { grid-template-columns:1fr; } }

  .demo-label { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); margin-bottom:10px; }
  .demo-tokens { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:28px; }
  .demo-tokens .tok { border:1px solid var(--hair); padding:14px; background:var(--bg-2); }
  .demo-tokens .tok .swatch { height:48px; margin-bottom:10px; border:1px solid var(--hair); }
  .demo-tokens .tok .name { font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:var(--ink); }
  .demo-tokens .tok .val  { font-family:var(--mono); font-size:10.5px; color:var(--mut); margin-top:3px; }

  .demo-type { border:1px solid var(--hair); background:var(--paper); padding:28px; margin-top:16px; display:grid; grid-template-columns:160px 1fr; gap:18px 28px; align-items:baseline; }
  .demo-type .k { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); }
  .demo-type .v { color:var(--ink); }

  .demo-utility { position:fixed; top:16px; inset-inline-end:16px; display:flex; gap:8px; z-index:10; }
  .demo-utility .btn { padding:8px 12px; }
</style>
</head>
<body>

<!-- utility bar: palette + lang swap -->
<div class="demo-utility">
  <span class="lang-pill" role="tablist" aria-label="Language">
    <button id="btn-en" class="on" type="button">EN</button>
    <button id="btn-ar" type="button">ع</button>
  </span>
  <span class="lang-pill" role="tablist" aria-label="Palette">
    <button class="pal-btn on" data-pal="midnight" type="button">midnight</button>
    <button class="pal-btn" data-pal="paper" type="button">paper</button>
    <button class="pal-btn" data-pal="mono" type="button">mono</button>
  </span>
</div>

<!-- mount -->
<div id="app"></div>

<script src="assets/i18n.js"></script>
<script src="assets/data.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="assets/dcp-kit.jsx"></script>
<script type="text/babel" src="DCP Kit.jsx"></script>

</body>
</html>
