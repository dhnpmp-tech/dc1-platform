<!doctype html>
<html lang="en" dir="ltr" data-lang="en" data-palette="midnight">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DCP — Sovereign GPU Compute for Arabic AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  window.DCP_TWEAKS = /*EDITMODE-BEGIN*/{
    "palette": "midnight",
    "density": "editorial",
    "accent": "gradient"
  }/*EDITMODE-END*/;
</script>
<style>
  :root {
    /* Midnight (default) — brand deep-navy ground, logo-driven */
    --bg:    #0a0b1a;          /* deep indigo near-black (matches logo bg) */
    --bg-2:  #10122a;
    --paper: #161834;          /* elevated surface */
    --ink:   #f5f3ee;          /* warm bone white (logo wordmark) */
    --ink-2: #c9c5bd;
    --mut:   #7b7a92;
    --dim:   #4e4d67;
    --line:  #272848;
    --hair:  #1f2040;
    --teal:  #2dd4b6;          /* logo teal */
    --orange:#ee7a3c;           /* logo orange */
    --accent:       var(--teal);
    --accent-2:     var(--orange);
    --accent-ink:   #0a0b1a;
    --hot:          #ee7a3c;

    --maxw: 1280px;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --serif:'Instrument Serif', 'Times New Roman', serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --arabic:'Noto Naskh Arabic', serif;
    --grad: linear-gradient(90deg, #2dd4b6 0%, #2dd4b6 28%, #6bb39a 55%, #ee7a3c 100%);
  }
  html[data-palette="paper"] {
    --bg:#f4efe6; --bg-2:#ece5d6; --paper:#faf6ed;
    --ink:#0a0b1a; --ink-2:#2a2940; --mut:#645d7a; --dim:#8a8299;
    --line:#0a0b1a; --hair:#d8cfbe;
    --teal:#0d9d87; --orange:#d85f22;
    --accent:var(--teal); --accent-2:var(--orange); --accent-ink:#faf6ed;
  }
  html[data-palette="mono"] {
    --bg:#ffffff; --bg-2:#f5f5f5; --paper:#ffffff;
    --ink:#0a0a0a; --ink-2:#1a1a1a; --mut:#555; --dim:#888;
    --line:#0a0a0a; --hair:#dcdcdc;
    --teal:#0a0a0a; --orange:#0a0a0a;
    --accent:#0a0a0a; --accent-2:#0a0a0a; --accent-ink:#ffffff;
    --grad: linear-gradient(90deg,#0a0a0a,#0a0a0a);
  }

  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  html[data-lang="ar"] body { font-family:var(--arabic); }
  html[data-lang="ar"] .mono, html[data-lang="ar"] pre, html[data-lang="ar"] code, html[data-lang="ar"] .tabular { font-family:var(--mono); direction:ltr; unicode-bidi:isolate; }
  a { color:inherit; text-decoration:none; }
  button { font:inherit; color:inherit; background:none; border:0; cursor:pointer; }

  .wrap { max-width:var(--maxw); margin:0 auto; padding: 0 32px; }
  @media (max-width:700px){ .wrap{ padding:0 18px; }}

  /* ─── Top marquee ─── */
  .marquee {
    background:#04050d; color:var(--ink-2);
    font-family:var(--mono); font-size:11px; letter-spacing:.18em;
    border-bottom:1px solid var(--line); overflow:hidden; white-space:nowrap;
  }
  .marquee-in { display:inline-flex; gap:48px; padding:9px 0; animation: marq 60s linear infinite; }
  .marquee-in span { display:inline-flex; align-items:center; gap:12px; }
  .marquee-in span::before { content:"∞"; color:var(--teal); font-size:13px; }
  @keyframes marq { from{transform:translateX(0);} to{transform:translateX(-50%);}}

  /* ─── Nav ─── */
  header.nav {
    position:sticky; top:0; z-index:40;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px);
    border-bottom:1px solid var(--hair);
  }
  .nav-in { display:flex; align-items:center; justify-content:space-between; padding: 18px 32px; gap:24px; }
  .brand { display:flex; align-items:center; gap:14px; }
  .brand-mark {
    width:36px; height:36px; position:relative;
    display:grid; place-items:center;
    background: transparent;
    border-radius:8px;
    overflow:hidden;
  }
  .brand-mark img { width:100%; height:100%; object-fit:cover; display:block; }
  html[data-palette="paper"] .brand-mark, html[data-palette="mono"] .brand-mark { background:#0a0b1a; }
  .infinity-chip {
    display:inline-block; vertical-align:middle;
    background-image: var(--grad); background-clip:text; -webkit-background-clip:text; color:transparent;
    font-weight:700;
  }
  .brand-name { font-family:var(--serif); font-size:26px; letter-spacing:-.01em; line-height:1; }
  .brand-name i { font-style:italic; color:var(--mut); font-size:16px; margin-inline-start:4px; }
  .nav-links { display:flex; gap:28px; }
  .nav-links a { font-size:13.5px; color:var(--ink-2); position:relative; }
  .nav-links a:hover { color:var(--teal); }
  .nav-right { display:flex; gap:10px; align-items:center; }
  .nav-status { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border:1px solid var(--hair); border-radius:999px; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--mut);}
  .nav-status .d { width:6px; height:6px; border-radius:50%; background:var(--teal); box-shadow:0 0 0 3px color-mix(in oklab, var(--teal) 25%, transparent); animation:pulse 1.8s ease-in-out infinite;}
  @media (max-width:1080px){ .nav-status{ display:none;} }
  .lang-pill { display:inline-flex; border:1px solid var(--hair); font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; overflow:hidden; border-radius:999px; }
  .lang-pill button { padding:5px 10px; color:var(--mut); }
  .lang-pill button.on { background:var(--ink); color:var(--bg); }
  @media (max-width:900px){ .nav-links{ display:none; } }

  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 18px; font-size:13.5px; font-weight:500;
    border:1px solid var(--ink); border-radius:2px;
    transition: background .15s, color .15s, transform .15s;
  }
  .btn:hover { transform:translateY(-1px); }
  .btn.primary { background:var(--ink); color:var(--bg); }
  .btn.primary:hover { background:var(--grad); background-size: 200% 100%; color:#0a0b1a; border-color: transparent; }
  .btn.ghost { background:transparent; color:var(--ink); }
  .btn.ghost:hover { background:var(--ink); color:var(--bg); }
  .btn.small { padding:8px 14px; font-size:12.5px; }
  .btn.lg { padding:14px 22px; font-size:15px; }

  /* Magnetic wrapper */
  .magnet { display:inline-block; transition: transform .25s cubic-bezier(.2,.7,.2,1); will-change: transform; }

  /* Sparkline canvas */
  canvas.spark { display:block; width:100%; }

  /* Demand meter — marketplace top */
  .demand {
    display:flex; align-items:stretch; gap:16px; padding: 16px 18px;
    background: var(--paper); border:1px solid var(--line);
    margin-bottom: 18px;
  }
  .demand-left { flex:1; min-width:0; }
  .demand-label {
    font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--mut); display:flex; justify-content:space-between; align-items:baseline;
  }
  .demand-label b { color:var(--ink); font-weight:500; letter-spacing:0; font-family:var(--sans); font-size:13px; text-transform:none;}
  .demand-bar { margin-top:10px; height:5px; background:var(--hair); border-radius:2px; overflow:hidden; position:relative;}
  .demand-bar span { position:absolute; inset:0; background: var(--grad); transform-origin:left; transition: transform .6s cubic-bezier(.2,.7,.2,1);}
  html[dir="rtl"] .demand-bar span { transform-origin:right; }
  .demand-right { width: 160px; display:flex; flex-direction:column; justify-content:space-between;}
  .demand-right .k { font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:var(--mut); text-transform:uppercase; }

  /* Token ribbon (playground) */
  .token-ribbon { display:flex; gap:4px; flex-wrap:wrap; margin-top:12px; min-height:24px; }
  .tok-chip {
    font-family:var(--mono); font-size:10.5px; padding: 3px 7px;
    background: color-mix(in oklab, var(--teal) 18%, transparent);
    color: var(--ink); border: 1px solid color-mix(in oklab, var(--teal) 35%, transparent);
    border-radius:2px;
    animation: tokIn .4s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes tokIn { from { opacity:0; transform: translateY(4px) scale(.95);} to {opacity:1; transform:none;} }

  /* Smooth anchor & nav underline indicator */
  html { scroll-behavior: smooth; }
  .nav-links a::after {
    content:""; position:absolute; left:0; right:0; bottom:-19px; height:2px;
    background: var(--grad); transform:scaleX(0); transform-origin:left;
    transition: transform .25s ease;
  }
  .nav-links a:hover::after { transform:scaleX(1); }

  /* Gradient sheen sweep (hero h1) */
  h1.hero-h em { background-size: 200% 100%; background-position: 0% 0%; animation: sheen 8s ease-in-out infinite; }
  @keyframes sheen { 0%,100%{background-position:0% 0%;} 50%{background-position:100% 0%;} }
  @media (prefers-reduced-motion: reduce) { h1.hero-h em { animation:none; } .marquee-in { animation:none; } }

  /* ─── Hero (with animated map background) ─── */
  .hero { padding: 70px 0 10px; position:relative; overflow:hidden; }
  .hero-bg {
    position:absolute; inset:0; pointer-events:none; z-index:0;
    mask-image: radial-gradient(ellipse at 75% 40%, #000 0%, #000 35%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at 75% 40%, #000 0%, #000 35%, transparent 75%);
  }
  .hero-map-canvas { position:absolute; inset:0; width:100%; height:100%; }
  .hero > .wrap { position:relative; z-index:1; }
  html[data-palette="paper"] .hero-bg, html[data-palette="mono"] .hero-bg { opacity:.45; }

  .hero { padding: 70px 0 10px; position:relative; }
  .hero-meta {
    display:flex; justify-content:space-between; align-items:flex-end; gap:24px;
    padding-bottom: 24px; border-bottom:1px solid var(--hair);
    margin-bottom: 56px;
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut);
  }
  .hero-meta .left{ display:flex; gap:28px; flex-wrap:wrap;}
  .hero-meta .dot { color:var(--teal); }
  .hero-body { display:grid; grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr); gap:80px; align-items:start;}
  @media (max-width:1100px){ .hero-body{ grid-template-columns:1fr; gap:48px;}}

  .eyebrow {
    font-family:var(--mono); font-size:11.5px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--teal); display:inline-flex; align-items:center; gap:10px;
  }
  .eyebrow::before { content:""; width:22px; height:1px; background:var(--teal); }

  h1.hero-h {
    font-family:var(--serif); font-weight:400; font-style:normal;
    font-size: clamp(54px, 8.4vw, 128px);
    line-height:0.94; letter-spacing:-0.025em; margin:24px 0 0;
    text-wrap:balance;
  }
  html[data-lang="ar"] h1.hero-h { font-family:var(--arabic); font-weight:700; letter-spacing:0; line-height:1.05; }
  h1.hero-h em {
    font-style:italic;
    background-image: var(--grad);
    background-clip:text; -webkit-background-clip:text; color:transparent;
  }
  html[data-lang="ar"] h1.hero-h em { font-style:normal;}
  h2.st em {
    font-style:italic;
    background-image: var(--grad);
    background-clip:text; -webkit-background-clip:text; color:transparent;
  }

  .hero-sub { font-size:18.5px; line-height:1.55; color:var(--ink-2); max-width:52ch; margin:28px 0 0; text-wrap:pretty;}
  .hero-ctas { display:flex; gap:10px; margin-top:32px; flex-wrap:wrap; }
  .hero-trusted { margin-top:34px; font-family:var(--mono); font-size:11px; color:var(--mut); letter-spacing:.1em; text-transform:uppercase;}
  .customer-strip { display:flex; gap:28px; flex-wrap:wrap; align-items:center; margin-top:14px;}
  .customer-strip span {
    font-family:var(--serif); font-size:22px; color:var(--ink-2); letter-spacing:-.01em;
    padding: 4px 0;
  }

  /* Hero right: live ticker card */
  .ticker-card {
    background: linear-gradient(180deg, var(--paper) 0%, var(--bg-2) 100%);
    border:1px solid var(--line); position:relative;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(45,212,182,.08) inset;
    overflow:hidden;
  }
  .ticker-card::before {
    content:""; position:absolute; inset:-1px -1px auto -1px; height:2px;
    background: var(--grad); opacity:.9;
  }
  .ticker-card.feat .feat-list { list-style:none; margin:0; padding:8px 0;}
  .ticker-card.feat .feat-list li { display:flex; gap:18px; padding: 18px 22px; border-bottom:1px solid var(--hair); align-items:flex-start;}
  .ticker-card.feat .feat-list li:last-child { border-bottom:0;}
  .ticker-card.feat .feat-list .n { font-family:var(--mono); font-size:11px; color:var(--teal); letter-spacing:.14em; min-width:26px; padding-top:3px;}
  .ticker-card.feat .feat-list .k { font-family:var(--serif); font-size:22px; letter-spacing:-.01em; color:var(--ink); line-height:1.1;}
  html[data-lang="ar"] .ticker-card.feat .feat-list .k { font-family:var(--arabic); font-weight:600; font-size:19px;}
  .ticker-card.feat .feat-list .v { font-family:var(--mono); font-size:11.5px; color:var(--mut); margin-top:5px; letter-spacing:.02em;}
  .tc-hd { display:flex; align-items:center; justify-content:space-between; padding: 14px 18px; border-bottom:1px solid var(--hair);
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut);}
  .tc-hd .live {display:inline-flex; align-items:center; gap:8px; color:var(--orange);}
  .tc-hd .live .d {width:7px; height:7px; border-radius:50%; background:var(--orange); animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.2;}}

  .tc-stats { display:grid; grid-template-columns: repeat(2, 1fr); }
  .tc-stat { padding: 20px 18px; border-inline-end:1px solid var(--hair); border-bottom:1px solid var(--hair);}
  .tc-stat:nth-child(2n){ border-inline-end:0; }
  .tc-stat:nth-last-child(-n+2){ border-bottom:0; }
  .tc-k { font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--mut);}
  .tc-v { font-family:var(--serif); font-size:44px; letter-spacing:-.02em; line-height:1; margin-top:4px; color:var(--ink); }
  html[data-lang="ar"] .tc-v { font-family:var(--arabic); font-weight:700;}
  .tc-v .u { font-family:var(--sans); font-size:13px; color:var(--mut); margin-inline-start:6px;}
  .tc-delta { font-family:var(--mono); font-size:11px; color:var(--teal); margin-top:6px;}
  .tc-delta.down { color:var(--orange); }

  .feed-card { border-top:1px solid var(--line); padding: 14px 18px; font-family:var(--mono); font-size:11.5px; color:var(--mut); max-height:180px; overflow:hidden; position:relative;}
  .feed-card::after { content:""; position:absolute; inset:auto 0 0 0; height:40px; background:linear-gradient(transparent, var(--paper)); pointer-events:none;}
  .feed-row { display:flex; gap:14px; padding: 5px 0; align-items:center;}
  .feed-row .arrow { color:var(--teal); }
  .feed-row .m { color:var(--ink); }
  .feed-row .r { margin-inline-start:auto; color:var(--dim); }

  /* ─── Section scaffold ─── */
  section { padding: 110px 0; border-top:1px solid var(--hair);}
  @media (max-width:700px){ section{ padding:70px 0;} }
  .section-meta {
    display:flex; justify-content:space-between; align-items:baseline;
    padding-bottom: 24px; border-bottom:1px solid var(--hair); margin-bottom: 40px;
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut);
  }
  .section-meta .idx { color:var(--ink); }
  h2.st { font-family:var(--serif); font-weight:400; font-size:clamp(40px, 5.6vw, 80px); line-height:1; letter-spacing:-.02em; margin:0; text-wrap:balance;}
  html[data-lang="ar"] h2.st { font-family:var(--arabic); font-weight:700; letter-spacing:0; line-height:1.12;}
  .ss { font-size:17px; color:var(--ink-2); line-height:1.6; max-width:56ch; margin-top:18px;}

  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:56px; align-items:start;}
  @media (max-width:960px){ .grid-2{ grid-template-columns:1fr; gap:32px;}}

  /* ─── Marketplace table ─── */
  .mk-controls { display:flex; gap:12px; margin-bottom:20px; align-items:center; flex-wrap:wrap;}
  .mk-search {
    flex:1; min-width:240px; padding:10px 14px; background:var(--paper); border:1px solid var(--hair);
    color:var(--ink); font-family:var(--sans); font-size:14px; border-radius:2px;
  }
  .mk-search:focus { outline:none; border-color:var(--ink); }
  .chip { padding:8px 14px; border:1px solid var(--hair); font-family:var(--mono); font-size:11px; letter-spacing:.1em; color:var(--ink-2); text-transform:uppercase; border-radius:2px;}
  .chip.on { background:var(--ink); color:var(--bg); border-color:var(--ink);}
  .chip .n { color:var(--mut); margin-inline-start:6px;} .chip.on .n { color: color-mix(in oklab, var(--bg) 60%, transparent);}

  .mk-table { width:100%; border-collapse:collapse; font-size:14px; background:var(--paper); border:1px solid var(--line);}
  .mk-table thead th {
    font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    text-align:start; padding: 14px 14px; border-bottom:1px solid var(--line); color:var(--mut);
    background:var(--bg-2); position:sticky; top:0;
  }
  .mk-table tbody td { padding:16px 14px; border-bottom:1px solid var(--hair); vertical-align:middle;}
  .mk-table tbody tr:last-child td { border-bottom:0;}
  .mk-table tbody tr { transition: background .15s; }
  .mk-table tbody tr:hover { background: color-mix(in oklab, var(--teal) 8%, var(--paper)); }
  .mk-table .gpu-cell { font-weight:500; }
  .mk-table .gpu-cell small { display:block; color:var(--mut); font-size:11px; font-family:var(--mono); margin-top:2px;}
  .mk-table .region { display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:12px;}
  .mk-table .region .pin { width:6px; height:6px; border-radius:50%; background:var(--teal);}
  .mk-table .provider { font-family:var(--mono); font-size:12.5px; color:var(--ink-2);}
  .util-cell { display:flex; align-items:center; gap:8px; min-width:80px;}
  .util-bar { flex:1; height:4px; background:var(--hair); position:relative; border-radius:2px; overflow:hidden;}
  .util-bar span { position:absolute; inset:0; background:var(--grad); transform-origin:left; }
  html[dir="rtl"] .util-bar span { transform-origin:right; }
  .util-val { font-family:var(--mono); font-size:11.5px; color:var(--mut); min-width:32px; }
  .price { font-family:var(--serif); font-size:20px; letter-spacing:-.01em; }
  html[data-lang="ar"] .price { font-family:var(--arabic); font-weight:600;}
  .price.usd { font-size:13px; color:var(--mut); font-family:var(--mono); }
  .rel { font-family:var(--mono); font-size:12px; color:var(--teal); }
  .perf { display:inline-flex; gap:2px;}
  .perf .bar { width:3px; background:var(--hair); border-radius:1px;}
  .perf .bar.on { background:var(--ink); }

  .mk-foot { margin-top:14px; display:flex; justify-content:space-between; font-family:var(--mono); font-size:11px; color:var(--mut); letter-spacing:.08em; text-transform:uppercase;}

  /* ─── Playground ─── */
  .pg { display:grid; grid-template-columns: 1fr 1fr; gap:28px;}
  @media (max-width:960px){ .pg{ grid-template-columns:1fr;}}
  .pg-pane { background:var(--paper); border:1px solid var(--line); padding:24px; position:relative;}
  .pg-label { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); margin-bottom:10px;}
  .select {
    width:100%; padding:12px 14px; background:var(--bg-2); border:1px solid var(--hair);
    display:flex; justify-content:space-between; align-items:center; cursor:pointer;
    font-size:14px; border-radius:2px; color:var(--ink);
  }
  select.select { appearance:none; -webkit-appearance:none;
    background-image: linear-gradient(45deg, transparent 50%, var(--mut) 50%), linear-gradient(-45deg, transparent 50%, var(--mut) 50%);
    background-position: calc(100% - 18px) center, calc(100% - 12px) center;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
    padding-inline-end: 32px;
  }
  select.select option { background:var(--paper); color:var(--ink);}
  .select:hover { border-color:var(--ink);}
  .select .tag { font-family:var(--mono); font-size:11px; color:var(--accent);}
  .prompt {
    width:100%; min-height:120px; margin-top:14px; padding:14px;
    background:var(--bg-2); border:1px solid var(--hair); color:var(--ink);
    font-family:var(--sans); font-size:14.5px; line-height:1.55; resize:vertical; border-radius:2px;
  }
