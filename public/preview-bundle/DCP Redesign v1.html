<!doctype html>
<html lang="en" dir="ltr" data-lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DCP — Sovereign GPU Compute for Arabic AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  /* EDITMODE defaults (Tweaks) */
  window.DCP_TWEAKS = /*EDITMODE-BEGIN*/{
    "palette": "sovereign",
    "headlineFont": "mono",
    "heroVariant": "map",
    "showTicker": true,
    "showMap": true,
    "compact": false
  }/*EDITMODE-END*/;
</script>
<style>
  :root {
    /* Sovereign palette (default) */
    --ink-0: #07090e;
    --ink-1: #0c1018;
    --ink-2: #121724;
    --ink-3: #1a2131;
    --line:  #232a3d;
    --line-2:#2e3651;
    --fg:    #e8ecf3;
    --fg-mut:#a7b0c2;
    --fg-dim:#6b7488;
    --gold:  #d9b26a;      /* desert gold */
    --gold-2:#f2d393;
    --gold-d:#8a6b33;
    --sand:  #e9ddc2;
    --green: #5fb37c;
    --red:   #e27a7a;
    --accent: var(--gold);

    --r-1: 4px;
    --r-2: 8px;
    --r-3: 14px;
    --r-4: 22px;

    --sans: 'Inter', system-ui, -apple-system, Helvetica, Arial, sans-serif;
    --serif:'Fraunces', 'Times New Roman', serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    --arabic: 'Noto Naskh Arabic', 'Geeza Pro', serif;

    --maxw: 1240px;
  }

  /* Alt palettes via tweaks */
  html[data-palette="midnight"] {
    --ink-0:#05070d; --ink-1:#0a0f1c; --ink-2:#10172a; --ink-3:#192142;
    --line:#1f294a; --line-2:#2b3a69;
    --fg:#eaf0ff; --fg-mut:#a3b0d1; --fg-dim:#6374a1;
    --gold:#6aa6ff; --gold-2:#a8c9ff; --gold-d:#345580;
    --accent: var(--gold);
  }
  html[data-palette="desert"] {
    --ink-0:#1a140c; --ink-1:#211a10; --ink-2:#2a2116; --ink-3:#382c1d;
    --line:#3d3020; --line-2:#55432c;
    --fg:#f4ebd8; --fg-mut:#c9ba9a; --fg-dim:#8c7e60;
    --gold:#e9c587; --gold-2:#f7dfa9; --gold-d:#8a6b33;
    --accent: var(--gold);
  }
  html[data-palette="mono"] {
    --ink-0:#050505; --ink-1:#0b0b0b; --ink-2:#131313; --ink-3:#1c1c1c;
    --line:#262626; --line-2:#333;
    --fg:#f2f2f2; --fg-mut:#b0b0b0; --fg-dim:#6a6a6a;
    --gold:#ffffff; --gold-2:#ffffff; --gold-d:#777;
    --accent: #ffffff;
  }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--ink-0); color:var(--fg); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  html[data-lang="ar"] body { font-family:var(--arabic); }
  html[data-lang="ar"] .mono, html[data-lang="ar"] pre, html[data-lang="ar"] code { font-family:var(--mono); direction:ltr; unicode-bidi:isolate; }

  a { color:inherit; text-decoration:none; }
  button { font:inherit; color:inherit; background:none; border:0; cursor:pointer; }

  /* ─── Shell ─── */
  .wrap { max-width:var(--maxw); margin:0 auto; padding: 0 28px; }
  @media (max-width: 720px){ .wrap{ padding:0 18px; } }

  .topline {
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 28px; font-size:12px; color:var(--fg-dim);
    border-bottom:1px solid var(--line);
    background: linear-gradient(to bottom, var(--ink-0), var(--ink-1));
  }
  .topline .dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; box-shadow:0 0 0 4px rgba(95,179,124,.12); margin-inline-end:8px; animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse { 0%,100%{opacity:.9;} 50%{opacity:.4;} }
  .topline .crumbs { display:flex; gap:18px; align-items:center; }
  .topline .crumbs span { letter-spacing:.08em; text-transform:uppercase; font-family:var(--mono); font-size:10.5px; }

  header.nav {
    position:sticky; top:0; z-index:40;
    backdrop-filter: blur(14px);
    background: color-mix(in oklab, var(--ink-0) 78%, transparent);
    border-bottom:1px solid var(--line);
  }
  .nav-in { display:flex; align-items:center; justify-content:space-between; padding: 18px 28px; }
  .brand { display:flex; align-items:center; gap:12px; font-weight:600; letter-spacing:.02em; }
  .brand-mark {
    width:30px; height:30px; border-radius:8px;
    background:
      radial-gradient(circle at 30% 30%, var(--gold-2), var(--gold) 50%, var(--gold-d) 100%);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.15), 0 6px 18px -6px var(--gold);
    position:relative;
  }
  .brand-mark::after{
    content:""; position:absolute; inset:6px;
    background: var(--ink-0);
    clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
  }
  .brand-name { font-size:16px; }
  .brand-name b { color:var(--fg); }
  .brand-name span { color:var(--fg-dim); font-weight:400; margin-inline-start:4px; }

  .nav-links { display:flex; gap:28px; align-items:center; }
  .nav-links a { color:var(--fg-mut); font-size:14px; }
  .nav-links a:hover { color:var(--fg); }
  .nav-right { display:flex; gap:10px; align-items:center; }
  .lang-toggle {
    display:inline-flex; border:1px solid var(--line); border-radius:999px; overflow:hidden;
    font-family:var(--mono); font-size:11px; letter-spacing:.08em;
  }
  .lang-toggle button { padding:6px 12px; color:var(--fg-dim); }
  .lang-toggle button.on { background:var(--ink-3); color:var(--fg); }

  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 16px; border-radius:var(--r-2);
    font-size:14px; font-weight:500;
    border:1px solid var(--line);
    transition: transform .15s ease, background .15s, border-color .15s, color .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn.primary {
    background: linear-gradient(180deg, var(--gold-2), var(--gold));
    color:#1a140a; border-color: transparent;
    box-shadow: 0 10px 30px -12px var(--gold);
  }
  .btn.primary:hover { filter:brightness(1.05); }
  .btn.ghost { color:var(--fg); }
  .btn.ghost:hover { border-color:var(--line-2); background:var(--ink-2); }
  .btn.small { padding:8px 12px; font-size:13px; }

  @media (max-width: 820px) { .nav-links { display:none; } }

  /* ─── Hero ─── */
  .hero { position:relative; padding: 80px 0 60px; overflow:hidden; }
  .hero::before {
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(700px 340px at 78% 0%, color-mix(in oklab, var(--gold) 18%, transparent), transparent 60%),
      radial-gradient(540px 320px at 10% 10%, color-mix(in oklab, var(--gold) 8%, transparent), transparent 70%);
    pointer-events:none;
  }
  .hero::after{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(to right, var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, #000 30%, transparent 72%);
    opacity:.25; pointer-events:none;
  }
  .hero-grid { position:relative; display:grid; grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr); gap:56px; align-items:center; }
  @media (max-width: 1080px) { .hero-grid { grid-template-columns: 1fr; gap:40px; } }

  .eyebrow {
    display:inline-flex; align-items:center; gap:10px;
    font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold);
    padding:6px 12px; border:1px solid color-mix(in oklab, var(--gold) 40%, var(--line));
    border-radius:999px; background: color-mix(in oklab, var(--gold) 8%, transparent);
  }
  .eyebrow .b { width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow: 0 0 10px var(--gold); }

  h1.hero-title {
    font-family: var(--serif);
    font-weight:500;
    font-size: clamp(44px, 6.2vw, 82px);
    line-height: 0.98;
    letter-spacing:-0.02em;
    margin: 22px 0 20px;
    text-wrap:balance;
  }
  html[data-lang="ar"] h1.hero-title { font-family: var(--arabic); font-weight:700; letter-spacing:0; }
  .hero-title .frag { display:block; }
  .hero-title .gold {
    background: linear-gradient(92deg, var(--gold-2), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .hero-sub { color:var(--fg-mut); font-size:18px; line-height:1.55; max-width:56ch; text-wrap:pretty; }
  .hero-ctas { display:flex; gap:12px; margin: 28px 0 16px; flex-wrap:wrap; }
  .hero-enterprise { color:var(--fg-dim); font-size:13px; }
  .hero-enterprise a { color:var(--gold); border-bottom:1px dashed color-mix(in oklab, var(--gold) 40%, transparent); }

  .chip-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:28px; }
  .chip {
    display:inline-flex; align-items:center; gap:8px;
    padding:7px 12px; border-radius:999px;
    background: var(--ink-2); border:1px solid var(--line);
    font-size:12.5px; color:var(--fg-mut);
  }
  .chip svg { color: var(--gold); }

  /* ─── Hero right (live terminal / map) ─── */
  .frame {
    position:relative;
    background: linear-gradient(180deg, var(--ink-2), var(--ink-1));
    border:1px solid var(--line); border-radius: var(--r-3);
    box-shadow: 0 40px 80px -40px rgba(0,0,0,.8), inset 0 1px 0 color-mix(in oklab, white 3%, transparent);
    overflow:hidden;
  }
  .frame-hd { display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:11.5px; color:var(--fg-dim); }
  .frame-hd .d { width:9px; height:9px; border-radius:50%; background:var(--line-2);}
  .frame-hd .d.r{ background:#e27a7a66;} .frame-hd .d.y{ background:#e7c66e66;} .frame-hd .d.g{ background:#5fb37c66;}
  .frame-hd .title { margin-inline-start:8px; color:var(--fg-mut); }
  .frame-hd .meta { margin-inline-start:auto; color:var(--fg-dim); letter-spacing:.06em; }

  /* ─── Live panel ─── */
  .live {
    display:grid; grid-template-columns: repeat(2, 1fr); gap:1px;
    background:var(--line); /* borders via gap */
  }
  .stat { background:var(--ink-1); padding:18px 16px; }
  .stat-k { font-family:var(--mono); font-size:10.5px; color:var(--fg-dim); letter-spacing:.14em; text-transform:uppercase; }
  .stat-v { font-family:var(--serif); font-size:34px; font-weight:500; margin-top:6px; color:var(--fg); letter-spacing:-.01em; }
  html[data-lang="ar"] .stat-v { font-family:var(--arabic); }
  .stat-v .u { color:var(--fg-dim); font-size:15px; margin-inline-start:6px; font-family:var(--sans); font-weight:400;}
  .stat .spark { margin-top:10px; height:28px; width:100%; }

  .ticker {
    border-top:1px solid var(--line); padding:8px 14px; font-family:var(--mono); font-size:12px; color:var(--fg-mut);
    display:flex; gap:28px; overflow:hidden;
  }
  .ticker .feed { display:flex; gap:28px; white-space:nowrap; animation: marq 28s linear infinite; }
  .ticker .row { display:inline-flex; gap:10px; }
  .ticker .row .m { color:var(--gold); }
  .ticker .row .t { color:var(--fg-dim); }
  @keyframes marq { from{ transform:translateX(0);} to{ transform:translateX(-50%);} }

  /* ─── Section scaffold ─── */
  section { padding: 96px 0; border-top:1px solid var(--line); position:relative; }
  section:first-of-type { border-top:0; }
  .section-hd { display:flex; justify-content:space-between; align-items:flex-end; gap:24px; margin-bottom:40px; }
  .section-title { font-family:var(--serif); font-weight:500; font-size: clamp(30px, 3.2vw, 48px); letter-spacing:-.02em; margin:0; }
  html[data-lang="ar"] .section-title { font-family:var(--arabic); font-weight:700; letter-spacing:0;}
  .section-sub { color:var(--fg-mut); max-width:54ch; margin-top:8px; font-size:16px; line-height:1.55; }
  .section-eyebrow { font-family:var(--mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }

  /* ─── Playground ─── */
  .pg { display:grid; grid-template-columns: 1fr 1fr; gap:28px; }
  @media (max-width: 960px){ .pg{ grid-template-columns:1fr; }}
  .pg-card { padding:20px; }
  .label { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--fg-dim); margin-bottom:8px;}
  .select {
    width:100%; display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:10px 12px; background:var(--ink-2); border:1px solid var(--line); border-radius:var(--r-2);
    font-size:14px; color:var(--fg);
  }
  .select:hover { border-color:var(--line-2); }
  .select .h { color:var(--gold); font-family:var(--mono); font-size:12px; }
  textarea.prompt {
    width:100%; min-height:110px; padding:14px; resize:vertical;
    background:var(--ink-0); border:1px solid var(--line); border-radius:var(--r-2);
    color:var(--fg); font-family:var(--sans); font-size:14px; line-height:1.55;
  }
  html[data-lang="ar"] textarea.prompt { font-family: var(--arabic); }
  textarea.prompt:focus { outline:none; border-color:var(--gold); box-shadow: 0 0 0 4px color-mix(in oklab, var(--gold) 20%, transparent); }

  .pg-actions { display:flex; gap:10px; align-items:center; margin-top:12px; }
  .pg-meta { margin-inline-start:auto; display:flex; gap:14px; font-family:var(--mono); font-size:12px; color:var(--fg-dim); }
  .pg-meta b { color:var(--fg); font-weight:500; }

  .response {
    background:var(--ink-0); border:1px solid var(--line); border-radius:var(--r-2);
    padding:16px; min-height:160px; font-size:14px; line-height:1.6; color:var(--fg);
    position:relative;
  }
  .response.empty { color:var(--fg-dim); display:flex; align-items:center; justify-content:center; text-align:center; }
  .response .cursor { display:inline-block; width:7px; height:16px; background:var(--gold); vertical-align:-3px; margin-inline-start:2px; animation: blink 1.1s step-end infinite;}
  @keyframes blink { 50% { opacity:0; }}
  html[data-lang="ar"] .response.rtl-out { direction:rtl; text-align:right; font-family:var(--arabic); }

  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:12px; }
  .tabs button { padding:8px 12px; font-family:var(--mono); font-size:12px; color:var(--fg-dim); border-bottom:2px solid transparent; margin-bottom:-1px;}
  .tabs button.on { color:var(--fg); border-color:var(--gold); }
  pre.code {
    margin:0; padding:14px; background:var(--ink-0); border:1px solid var(--line); border-radius:var(--r-2);
    font-family:var(--mono); font-size:12.5px; line-height:1.65; color:var(--fg-mut);
    overflow:auto; max-height:260px;
  }
  pre.code .k { color:#c8a6ff; } pre.code .s { color:var(--gold-2); } pre.code .c { color:var(--fg-dim); } pre.code .n { color:#9bd3ff; } pre.code .f { color:var(--gold); }

  /* ─── Model catalog ─── */
  .filter-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .filter {
    padding:7px 12px; border-radius:999px; border:1px solid var(--line);
    font-family:var(--mono); font-size:11.5px; letter-spacing:.08em; color:var(--fg-mut);
  }
  .filter.on { background:var(--ink-3); color:var(--fg); border-color:var(--line-2); }
  .filter .n { color:var(--fg-dim); margin-inline-start:6px; }

  .models-grid { display:grid; grid-template-columns: repeat(12, 1fr); gap:14px; }
  .m-card {
    grid-column: span 4;
    background:var(--ink-1); border:1px solid var(--line); border-radius:var(--r-3);
    padding:20px; position:relative; overflow:hidden;
    transition: border-color .15s, transform .15s, background .15s;
  }
  .m-card:hover { border-color:var(--line-2); transform:translateY(-2px); background:var(--ink-2); }
  @media (max-width: 960px){ .m-card{ grid-column: span 6;} }
  @media (max-width: 620px){ .m-card{ grid-column: span 12;} }
  .m-card .hot {
    position:absolute; top:16px; inset-inline-end:16px;
    font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--gold);
    display:flex; align-items:center; gap:6px;
  }
  .m-card .hot .d { width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow: 0 0 8px var(--gold); animation:pulse 2s ease-in-out infinite;}
  .m-card .org { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-dim); }
  .m-card .name { font-family:var(--serif); font-weight:500; font-size:22px; margin:6px 0 4px; letter-spacing:-.01em; }
  html[data-lang="ar"] .m-card .name { font-family:var(--arabic); font-weight:600; }
  .m-card .tag { color:var(--gold); font-size:12.5px; }
  .m-card .row { display:flex; justify-content:space-between; margin-top:18px; padding-top:14px; border-top:1px dashed var(--line); font-family:var(--mono); font-size:12px; color:var(--fg-mut); }
  .m-card .row b { color:var(--fg); font-weight:500; }

  /* ─── Providers ─── */
  .prov-grid { display:grid; grid-template-columns: 1.1fr 1fr; gap:28px; align-items:stretch; }
  @media(max-width: 960px){ .prov-grid{ grid-template-columns:1fr; }}
  .check-list { list-style:none; padding:0; margin:24px 0 0; display:flex; flex-direction:column; gap:12px; }
  .check-list li { display:flex; gap:12px; align-items:flex-start; font-size:15px; color:var(--fg-mut); }
  .check-list li .mk { width:20px; height:20px; border-radius:50%; border:1px solid color-mix(in oklab, var(--gold) 40%, var(--line)); color:var(--gold); display:grid; place-items:center; flex-shrink:0; margin-top:2px; }
  .check-list li b { color:var(--fg); font-weight:500; }

  /* Earnings calc */
  .calc { padding:22px; }
  .calc .field { margin-top:16px; }
  .calc .field:first-of-type { margin-top:0; }
  .slider { width:100%; appearance:none; height:4px; background:var(--line); border-radius:4px; outline:none;}
  .slider::-webkit-slider-thumb { appearance:none; width:18px; height:18px; border-radius:50%; background:var(--gold); border:3px solid var(--ink-0); cursor:pointer;}
  .slider::-moz-range-thumb { width:18px; height:18px; border-radius:50%; background:var(--gold); border:3px solid var(--ink-0); cursor:pointer;}
  .calc .row-sm { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; font-family:var(--mono); font-size:11.5px; color:var(--fg-dim); letter-spacing:.1em; text-transform:uppercase;}
  .calc .row-sm b { color:var(--fg); font-family:var(--sans); font-weight:500; font-size:14px; letter-spacing:0; text-transform:none;}

  .calc-out {
    margin-top:22px; padding:18px; border-radius:var(--r-2);
    background: linear-gradient(180deg, color-mix(in oklab, var(--gold) 12%, transparent), transparent);
    border:1px solid color-mix(in oklab, var(--gold) 30%, var(--line));
  }
  .calc-out .big { font-family:var(--serif); font-size:46px; font-weight:500; letter-spacing:-.02em; color:var(--gold-2); line-height:1;}
  html[data-lang="ar"] .calc-out .big { font-family:var(--arabic); font-weight:700;}
  .calc-out .big .u { font-family:var(--sans); font-size:16px; color:var(--fg-mut); font-weight:400; margin-inline-start:6px;}
  .calc-out .sub { color:var(--fg-dim); font-size:12px; margin-top:6px; }

  /* ─── How it works ─── */
  .steps { display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; }
  @media(max-width:960px){ .steps{ grid-template-columns: repeat(2,1fr);}}
  @media(max-width:560px){ .steps{ grid-template-columns: 1fr;}}
  .step {
    padding:22px; background:var(--ink-1); border:1px solid var(--line); border-radius:var(--r-3);
    position:relative; min-height:180px;
  }
  .step .n { font-family:var(--mono); font-size:11px; color:var(--gold); letter-spacing:.14em; margin-bottom:14px; }
  .step .t { font-family:var(--serif); font-size:22px; font-weight:500; letter-spacing:-.01em; margin:0 0 8px; }
  html[data-lang="ar"] .step .t { font-family:var(--arabic); font-weight:600;}
  .step .d { color:var(--fg-mut); font-size:14px; line-height:1.55; }

  /* ─── Map ─── */
  .map-wrap {
    display:grid; grid-template-columns: 1.2fr 1fr; gap:28px; align-items:stretch;
  }
  @media(max-width: 960px){ .map-wrap{ grid-template-columns:1fr; }}
  .map {
    position:relative; aspect-ratio: 4/3;
    background:
      radial-gradient(circle at 65% 45%, color-mix(in oklab, var(--gold) 12%, transparent), transparent 60%),
      var(--ink-1);
