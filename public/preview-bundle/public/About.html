<!doctype html>
<html lang="en" dir="ltr" data-lang="en" data-palette="midnight">
<head>
<meta charset="utf-8">
<title>About — DCP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/dcp-kit.css">
<style>
  /* hero — manifesto */
  .ab-hero { padding: 140px 0 80px; border-bottom: 1px solid var(--hair); position: relative; }
  .ab-hero h1 {
    font-family: var(--serif); font-weight: 400; line-height: 1.0; letter-spacing: -0.02em;
    font-size: clamp(56px, 9vw, 128px); margin: 28px 0 0; color: var(--ink);
  }
  .ab-hero h1 em { color: var(--orange); font-style: italic; font-weight: 400; }
  .ab-hero .manifesto {
    max-width: 62ch; margin-top: 64px; color: var(--ink-2); font-size: 22px; line-height: 1.55;
    font-family: var(--serif); font-weight: 400;
  }
  .ab-hero .manifesto p { margin: 0 0 24px; }
  .ab-hero .manifesto p:first-letter {
    font-size: 72px; float: inline-start; line-height: 0.85; margin: 4px 12px 0 0; color: var(--orange); font-style: italic;
  }
  .ab-hero .manifesto strong { color: var(--ink); font-weight: 500; font-style: italic; }

  /* numbers bar */
  .nums { display:grid; grid-template-columns: repeat(4,1fr); border-top:1px solid var(--hair); border-bottom:1px solid var(--hair); margin-top:100px; background: var(--paper); }
  .nums .n { padding:40px 36px; border-inline-end:1px solid var(--hair); }
  .nums .n:last-child { border-inline-end:none; }
  .nums .n .k { font-family: var(--mono); font-size: 11px; letter-spacing: .14em; color: var(--mut); text-transform: uppercase; }
  .nums .n .v { font-family: var(--serif); font-size: 68px; line-height: 1.0; color: var(--ink); margin-top: 18px; }
  @media (max-width: 760px) { .nums { grid-template-columns: 1fr 1fr; } .nums .n:nth-child(2) { border-inline-end:none; } .nums .n:nth-child(-n+2) { border-bottom:1px solid var(--hair); } }

  /* timeline */
  .tl { display: grid; grid-template-columns: 160px 1fr; gap: 48px; padding: 32px 0; border-top: 1px solid var(--hair); }
  .tl:first-of-type { border-top: none; }
  .tl .y { font-family: var(--serif); font-style: italic; font-size: 64px; color: var(--orange); line-height: 1.0; }
  .tl .body h3 { font-family: var(--serif); font-weight: 400; font-size: 38px; color: var(--ink); margin: 0 0 12px; line-height: 1.1; }
  .tl .body p { color: var(--ink-2); font-size: 17px; line-height: 1.6; margin: 0; max-width: 62ch; }

  /* team */
  .team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border: 1px solid var(--hair); background: var(--paper); margin-top: 32px; }
  .team-grid .card { padding: 36px 36px; border-inline-end: 1px solid var(--hair); border-bottom: 1px solid var(--hair); position: relative; }
  .team-grid .card:nth-child(2n) { border-inline-end: none; }
  .team-grid .card:nth-last-child(-n+2) { border-bottom: none; }
  .team-grid .card .avatar {
    width: 72px; height: 72px; border-radius: 50%; background: var(--bg-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 32px; color: var(--orange); border: 1px solid var(--hair);
  }
  .team-grid .card .name { font-family: var(--serif); font-weight: 400; font-size: 26px; color: var(--ink); margin: 18px 0 4px; }
  .team-grid .card .role { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; color: var(--mut); text-transform: uppercase; }
  .team-grid .card .bio  { color: var(--ink-2); font-size: 15px; line-height: 1.6; margin-top: 16px; }
  @media (max-width: 760px) { .team-grid { grid-template-columns: 1fr; } .team-grid .card { border-inline-end: none; } }

  /* investors */
  .inv { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--hair); margin-top: 32px; background: var(--paper); }
  .inv .i { padding: 52px 32px; text-align: center; border-inline-end: 1px solid var(--hair); font-family: var(--serif); font-weight: 400; font-size: 22px; color: var(--ink); line-height: 1.3; letter-spacing: -.005em; }
  .inv .i:last-child { border-inline-end: none; }
  @media (max-width: 760px) { .inv { grid-template-columns: 1fr 1fr; } .inv .i { border-inline-end: none; } .inv .i:nth-child(odd) { border-inline-end: 1px solid var(--hair); } .inv .i:nth-child(-n+2) { border-bottom: 1px solid var(--hair); } }

  /* quote / standalone */
  .bigq { padding: 120px 0; border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair); background: var(--bg-2); }
  .bigq blockquote { font-family: var(--serif); font-weight: 400; font-size: clamp(30px, 4.4vw, 56px); line-height: 1.15; letter-spacing: -.01em; margin: 0 auto; max-width: 22ch; text-align: center; color: var(--ink); }
  .bigq blockquote em { color: var(--orange); }
  .bigq .cite { margin-top: 36px; text-align: center; font-family: var(--mono); font-size: 11px; letter-spacing: .18em; color: var(--mut); }

  .util-bar-top { position:fixed; top:16px; inset-inline-end:16px; display:flex; gap:8px; z-index:20; }
</style>
</head>
<body>

<div class="util-bar-top">
  <span class="lang-pill" id="lang-pill">
    <button data-l="en" class="on">EN</button>
    <button data-l="ar">ع</button>
  </span>
</div>

<div id="app"></div>
