<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DCP Ops — Feature Flags</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/dcp-kit.css" />
<link rel="stylesheet" href="../assets/ops-shell.css" />
<style>
.ff-card { background: var(--paper); border: 1px solid var(--hair); padding: 16px 18px; }
.ff-card.canary { border-inline-start: 3px solid var(--amber); }
.ff-card.ga { border-inline-start: 3px solid var(--green); }
.ff-card.internal { border-inline-start: 3px solid var(--mut); }
.ff-key { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing: -.01em; }

.ff-meter { position: relative; height: 8px; background: var(--bg-2); border: 1px solid var(--hair-2); margin-top: 10px; }
.ff-meter-fill { position: absolute; inset-block: 0; inset-inline-start: 0; background: var(--accent); }
.ff-meter-fill.ga { background: var(--green); }
.ff-meter-fill.canary { background: var(--amber); }
.ff-meter-fill.internal { background: var(--mut); }
.ff-meter-pct { font-family: var(--mono); font-size: 11px; color: var(--ink); text-align:end; margin-top:4px; letter-spacing:.04em; }
</style>
</head>
<body class="ops">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../assets/data-ops-admin.js"></script>
<script type="text/babel" src="../assets/ops-shell.jsx"></script>
<script type="text/babel">
const { useState } = React;
const A = window.DCP_OPS_ADMIN;
const { OpsShell, Chip, Kpi } = window;

function App() {
  const [state, setState] = useState("all");
  const states = [...new Set(A.flags.map(f=>f.state))];
  const rows = state==="all" ? A.flags : A.flags.filter(f=>f.state===state);
  const mapStateClass = s => s==="ga"?"ga":s==="canary"?"canary":"internal";

  return (
    <OpsShell current="flags" crumb="Feature Flags" alarms={1} env="PROD" build={A.build}>
      <div className="ops-page">
        <div className="ops-page-hd">
          <div>
            <div className="ops-page-eb">Ops · Experiments</div>
            <h1 className="ops-page-h1">Feature <em>flags</em></h1>
            <div className="ops-page-lede">
              Rollout state for every experiment and gated feature on DCP. Percentages are evaluated per-org-hashed-bucket; changes propagate in ≤ 10 s.
            </div>
          </div>
          <div className="ops-page-actions">
            <button className="ops-btn">History</button>
            <button className="ops-btn primary">+ New flag</button>
          </div>
        </div>

        <div className="ops-grid c4" style={{marginBottom:14}}>
          <Kpi label="Total flags" value={A.flags.length} em />
          <Kpi label="GA" value={A.flags.filter(f=>f.state==="ga").length} delta="rolled out 100%" />
          <Kpi label="Canary" value={A.flags.filter(f=>f.state==="canary").length} delta="3 at 25–50%" deltaKind="neutral" />
          <Kpi label="Internal only" value={A.flags.filter(f=>f.state==="internal-only").length} delta="dcp-internal" deltaKind="neutral" />
        </div>

        <div className="ops-toolbar">
          <div className="ops-filters">
            <button className={"ops-filter " + (state==="all"?"on":"")} onClick={()=>setState("all")}>All <span className="ct">{A.flags.length}</span></button>
            {states.map(s => (
              <button key={s} className={"ops-filter " + (state===s?"on":"")} onClick={()=>setState(s)}>{s} <span className="ct">{A.flags.filter(f=>f.state===s).length}</span></button>
            ))}
          </div>
          <input className="ops-search" placeholder="flag key / owner…" />
        </div>

        <div style={{display:"grid", gap:10}}>
          {rows.map(f => (
            <div key={f.key} className={"ff-card " + mapStateClass(f.state)}>
              <div style={{display:"grid", gridTemplateColumns:"1fr 240px", gap:24, alignItems:"start"}}>
                <div>
                  <div style={{display:"flex", gap:6, marginBottom:6, alignItems:"center", flexWrap:"wrap"}}>
                    <Chip kind={f.state==="ga"?"ok":f.state==="canary"?"warn":"mut"} dot>{f.state}</Chip>
                    <span className="mono dim" style={{fontSize:10, letterSpacing:".06em"}}>owner {f.owner} · changed {f.changed}</span>
                  </div>
                  <div className="ff-key">{f.key}</div>
                  <div style={{fontSize:13, color:"var(--ink-2)", lineHeight:1.5, marginTop:8}}>{f.desc}</div>
                  <div className="mono" style={{fontSize:11, color:"var(--mut)", marginTop:8, letterSpacing:".03em"}}>targets <span style={{color:"var(--ink)"}}>{f.targets}</span></div>
                </div>
                <div>
                  <div className="mono dim" style={{fontSize:10, letterSpacing:".12em", textTransform:"uppercase"}}>Rollout</div>
                  <div className="ff-meter">
                    <div className={"ff-meter-fill " + mapStateClass(f.state)} style={{width: (f.rollout*100) + "%"}} />
                  </div>
                  <div className="ff-meter-pct">{(f.rollout*100).toFixed(0)}% of traffic</div>
                  <div style={{display:"flex", gap:6, marginTop:10, justifyContent:"flex-end"}}>
                    <button className="ops-btn sm">Edit</button>
                    <button className="ops-btn sm primary">Ramp →</button>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </OpsShell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
