<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Rounded square background shape (transparent) -->
  <rect x="10" y="10" width="180" height="180" rx="36" fill="none"/>

  <!-- Circuit board traces - top -->
  <g stroke="#38B6E0" stroke-width="3" stroke-linecap="round">
    <!-- Top traces -->
    <line x1="60" y1="10" x2="60" y2="40"/>
    <line x1="80" y1="10" x2="80" y2="30"/>
    <line x1="100" y1="10" x2="100" y2="35"/>
    <line x1="120" y1="10" x2="120" y2="30"/>
    <line x1="140" y1="10" x2="140" y2="40"/>

    <!-- Bottom traces -->
    <line x1="60" y1="190" x2="60" y2="160"/>
    <line x1="80" y1="190" x2="80" y2="170"/>
    <line x1="100" y1="190" x2="100" y2="165"/>
    <line x1="120" y1="190" x2="120" y2="170"/>
    <line x1="140" y1="190" x2="140" y2="160"/>

    <!-- Left traces -->
    <line x1="10" y1="60" x2="40" y2="60"/>
    <line x1="10" y1="80" x2="30" y2="80"/>
    <line x1="10" y1="100" x2="35" y2="100"/>
    <line x1="10" y1="120" x2="30" y2="120"/>
    <line x1="10" y1="140" x2="40" y2="140"/>

    <!-- Right traces -->
    <line x1="190" y1="60" x2="160" y2="60"/>
    <line x1="190" y1="80" x2="170" y2="80"/>
    <line x1="190" y1="100" x2="165" y2="100"/>
    <line x1="190" y1="120" x2="170" y2="120"/>
    <line x1="190" y1="140" x2="160" y2="140"/>
  </g>

  <!-- Circuit nodes (dots at end of traces) -->
  <g fill="#38B6E0">
    <circle cx="60" cy="40" r="4"/>
    <circle cx="80" cy="30" r="3"/>
    <circle cx="100" cy="35" r="4"/>
    <circle cx="120" cy="30" r="3"/>
    <circle cx="140" cy="40" r="4"/>

    <circle cx="60" cy="160" r="4"/>
    <circle cx="80" cy="170" r="3"/>
    <circle cx="100" cy="165" r="4"/>
    <circle cx="120" cy="170" r="3"/>
    <circle cx="140" cy="160" r="4"/>

    <circle cx="40" cy="60" r="4"/>
    <circle cx="30" cy="80" r="3"/>
    <circle cx="35" cy="100" r="4"/>
    <circle cx="30" cy="120" r="3"/>
    <circle cx="40" cy="140" r="4"/>

    <circle cx="160" cy="60" r="4"/>
    <circle cx="170" cy="80" r="3"/>
    <circle cx="165" cy="100" r="4"/>
    <circle cx="170" cy="120" r="3"/>
    <circle cx="160" cy="140" r="4"/>
  </g>

  <!-- Inner rounded square border -->
  <rect x="35" y="35" width="130" height="130" rx="28" fill="none" stroke="#38B6E0" stroke-width="4"/>

  <!-- Arabic letter ض (Dhad) - stylized -->
  <text x="100" y="125" text-anchor="middle" font-family="'Noto Sans Arabic', 'Arial', sans-serif" font-size="90" font-weight="700" fill="#38B6E0">ض</text>

  <!-- Dot above the Dhad (accent dot) -->
  <circle cx="100" cy="65" r="6" fill="#38B6E0"/>
</svg>
