<svg xmlns="http://www.w3.org/2000/svg" width="140" height="36" viewBox="0 0 140 36" fill="none">
  <!-- ض circuit icon in rounded square -->
  <g transform="translate(1, 1)">
    <!-- Rounded square background -->
    <rect x="0" y="0" width="34" height="34" rx="8" ry="8" fill="none" stroke="#38B6E0" stroke-width="1.5"/>

    <!-- Circuit traces - top -->
    <line x1="8" y1="4" x2="8" y2="8" stroke="#38B6E0" stroke-width="1"/>
    <line x1="14" y1="4" x2="14" y2="7" stroke="#38B6E0" stroke-width="1"/>
    <line x1="20" y1="4" x2="20" y2="7" stroke="#38B6E0" stroke-width="1"/>
    <line x1="26" y1="4" x2="26" y2="8" stroke="#38B6E0" stroke-width="1"/>

    <!-- Circuit traces - bottom -->
    <line x1="8" y1="26" x2="8" y2="30" stroke="#38B6E0" stroke-width="1"/>
    <line x1="14" y1="27" x2="14" y2="30" stroke="#38B6E0" stroke-width="1"/>
    <line x1="20" y1="27" x2="20" y2="30" stroke="#38B6E0" stroke-width="1"/>
    <line x1="26" y1="26" x2="26" y2="30" stroke="#38B6E0" stroke-width="1"/>

    <!-- Circuit traces - left -->
    <line x1="4" y1="11" x2="7" y2="11" stroke="#38B6E0" stroke-width="1"/>
    <line x1="4" y1="17" x2="7" y2="17" stroke="#38B6E0" stroke-width="1"/>
    <line x1="4" y1="23" x2="7" y2="23" stroke="#38B6E0" stroke-width="1"/>

    <!-- Circuit traces - right -->
    <line x1="27" y1="11" x2="30" y2="11" stroke="#38B6E0" stroke-width="1"/>
    <line x1="27" y1="17" x2="30" y2="17" stroke="#38B6E0" stroke-width="1"/>
    <line x1="27" y1="23" x2="30" y2="23" stroke="#38B6E0" stroke-width="1"/>

    <!-- Circuit nodes -->
    <circle cx="8" cy="4" r="1.2" fill="#38B6E0"/>
    <circle cx="14" cy="4" r="1.2" fill="#38B6E0"/>
    <circle cx="20" cy="4" r="1.2" fill="#38B6E0"/>
    <circle cx="26" cy="4" r="1.2" fill="#38B6E0"/>
    <circle cx="8" cy="30" r="1.2" fill="#38B6E0"/>
    <circle cx="14" cy="30" r="1.2" fill="#38B6E0"/>
    <circle cx="20" cy="30" r="1.2" fill="#38B6E0"/>
    <circle cx="26" cy="30" r="1.2" fill="#38B6E0"/>
    <circle cx="4" cy="11" r="1.2" fill="#38B6E0"/>
    <circle cx="4" cy="17" r="1.2" fill="#38B6E0"/>
    <circle cx="4" cy="23" r="1.2" fill="#38B6E0"/>
    <circle cx="30" cy="11" r="1.2" fill="#38B6E0"/>
    <circle cx="30" cy="17" r="1.2" fill="#38B6E0"/>
    <circle cx="30" cy="23" r="1.2" fill="#38B6E0"/>

    <!-- ض (Dhad) letter -->
    <text x="17" y="23" font-family="'Traditional Arabic', 'Noto Naskh Arabic', 'Amiri', serif" font-size="20" font-weight="bold" fill="#38B6E0" text-anchor="middle">ض</text>
  </g>

  <!-- DCP text -->
  <text x="44" y="24" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="24" font-weight="700" letter-spacing="1" fill="#ffffff">DCP</text>
</svg>
