<svg xmlns="http://www.w3.org/2000/svg" width="120" height="36" viewBox="0 0 120 36" fill="none">
  <!-- Lightning bolt with circuit traces icon -->
  <g transform="translate(2, 2)">
    <!-- Bolt -->
    <polygon points="18,0 10,15 14,15 8,32 24,13 19,13 26,0" fill="#E85D20"/>
    <!-- Circuit traces -->
    <g stroke="#888888" stroke-width="1.2" fill="none">
      <line x1="16" y1="10" x2="28" y2="7"/>
      <line x1="16" y1="18" x2="30" y2="18"/>
      <line x1="16" y1="24" x2="28" y2="27"/>
    </g>
    <!-- Circuit nodes -->
    <circle cx="28" cy="7" r="2" fill="#888888"/>
    <circle cx="30" cy="18" r="2" fill="#888888"/>
    <circle cx="28" cy="27" r="2" fill="#888888"/>
  </g>
  <!-- DCP text -->
  <text x="40" y="25" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="22" font-weight="500" letter-spacing="-0.5" fill="#ffffff">DCP</text>
  <!-- Orange underline accent -->
  <rect x="40" y="27" width="44" height="2" rx="1" fill="#E85D20"/>
  <!-- Dot -->
  <circle cx="90" cy="24" r="2.5" fill="#E85D20"/>
</svg>
