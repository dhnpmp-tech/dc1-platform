syntax = "proto3";
package dc1;

// DC1 P2P Job Routing Protocol — Phase C
//
// Canonical schema for all messages on the DC1 P2P wire.
// Runtime uses JSON serialisation (no compilation required for prototype).
// Use protoc + betterproto to generate typed Python bindings when ready.
//
// Protocol IDs:
//   /dc1/announce/1.0.0  — capacity broadcasts (provider discovery)
//   /dc1/job/1.0.0       — job lifecycle (request → bid → accept → result)
//   /dc1/relay/1.0.0     — bootstrap relay (Circuit Relay, Phase C only)

// ─────────────────────────────────────────────────────────────────────────────
// Envelope — every message on the wire is wrapped in this
// ─────────────────────────────────────────────────────────────────────────────

message Envelope {
  string type      = 1;  // MsgType string
  string from_peer = 2;  // sender peer ID
  string to_peer   = 3;  // recipient peer ID or "broadcast"
  string timestamp = 4;  // ISO-8601 UTC
  string protocol  = 5;  // /dc1/job/1.0.0 or /dc1/announce/1.0.0
  bytes  payload   = 6;  // serialised inner message (JSON for Phase C)
}

// ─────────────────────────────────────────────────────────────────────────────
// ANNOUNCE_CAPACITY  —  provider → bootstrap → renters
// ─────────────────────────────────────────────────────────────────────────────

message AnnounceCapacity {
  string peer_id           = 1;
  string gpu_model         = 2;   // e.g. "RTX 4090"
  uint32 vram_gb           = 3;
  float  price_sar_per_hr  = 4;   // display price (SAR)
  uint64 price_halala_hr   = 5;   // canonical billing unit (1 SAR = 100 halala)
  string cuda_version      = 6;
  string driver_version    = 7;
  string location          = 8;   // e.g. "Riyadh, SA"
  string ws_addr           = 9;   // ws://host:port — direct P2P address
  string announced_at      = 10;  // ISO-8601 UTC
}

// ─────────────────────────────────────────────────────────────────────────────
// JOB_REQUEST  —  renter → bootstrap → providers
// ─────────────────────────────────────────────────────────────────────────────

message JobRequest {
  string job_id               = 1;  // UUID generated by renter
  string renter_peer_id       = 2;
  string renter_ws_addr       = 3;  // ws://host:port for result delivery
  string job_type             = 4;  // "llm_inference" | "image_gen" | "training"
  string docker_image         = 5;  // e.g. "vllm/vllm-openai:latest" or "dc1/simulate"
  string command              = 6;  // command to run inside container
  uint32 min_vram_gb          = 7;  // minimum GPU VRAM required
  uint64 max_price_halala_hr  = 8;  // renter's maximum budget (halala/hr)
  uint32 timeout_secs         = 9;  // maximum job duration
}

// ─────────────────────────────────────────────────────────────────────────────
// JOB_BID  —  provider → bootstrap → renter
// ─────────────────────────────────────────────────────────────────────────────

message JobBid {
  string job_id                  = 1;
  string provider_peer_id        = 2;
  string provider_ws_addr        = 3;
  string renter_peer_id          = 4;
  uint64 price_halala_hr         = 5;  // offered price
  string gpu_model               = 6;
  uint32 vram_gb                 = 7;
  uint64 estimated_cost_halala   = 8;  // estimated total (price × estimated_secs / 3600)
}

// ─────────────────────────────────────────────────────────────────────────────
// JOB_ACCEPT  —  renter → bootstrap → winning provider
// ─────────────────────────────────────────────────────────────────────────────

message JobAccept {
  string job_id                   = 1;
  string provider_peer_id         = 2;  // winning provider
  string renter_peer_id           = 3;
  string renter_ws_addr           = 4;  // where provider delivers JOB_RESULT
  uint64 agreed_price_halala_hr   = 5;
  string docker_image             = 6;
  string command                  = 7;
}

// ─────────────────────────────────────────────────────────────────────────────
// JOB_RESULT  —  provider → renter (direct P2P first, relay fallback)
// ─────────────────────────────────────────────────────────────────────────────

message JobResult {
  string job_id            = 1;
  string provider_peer_id  = 2;
  string renter_peer_id    = 3;
  bool   success           = 4;
  string output            = 5;  // stdout / model output (truncated at 64 KB)
  string error             = 6;  // error message if !success
  uint32 duration_secs     = 7;
  uint64 cost_halala       = 8;  // actual cost (duration × price / 3600)
  string completed_at      = 9;  // ISO-8601 UTC
}
